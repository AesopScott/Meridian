<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Meridian Diagram Deck</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #07111f;
      --panel: #0d1b2e;
      --line: #1d3956;
      --text: #e6f1ff;
      --muted: #8ba6c3;
      --accent: #4dd7ff;
      --accent-2: #6ee7b7;
    }

    * { box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      background: radial-gradient(circle at top, #10243b 0, var(--bg) 46%, #030712 100%);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      overflow: hidden;
    }

    body {
      display: grid;
      grid-template-rows: auto 1fr auto;
    }

    header, footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 12px 18px;
      background: rgba(7, 17, 31, 0.82);
      border-color: var(--line);
      backdrop-filter: blur(14px);
    }

    header { border-bottom: 1px solid var(--line); }
    footer { border-top: 1px solid var(--line); }

    h1 {
      margin: 0;
      font-size: 16px;
      font-weight: 700;
      letter-spacing: 0;
    }

    .meta, .hint {
      color: var(--muted);
      font-size: 13px;
      white-space: nowrap;
    }

    .stage {
      position: relative;
      display: grid;
      place-items: center;
      min-height: 0;
      padding: 18px;
      cursor: pointer;
      user-select: none;
    }

    .image-wrap {
      position: relative;
      width: min(100%, 1500px);
      height: 100%;
      display: grid;
      place-items: center;
    }

    img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      border: 1px solid rgba(77, 215, 255, 0.22);
      border-radius: 8px;
      box-shadow: 0 24px 90px rgba(0, 0, 0, 0.45);
      background: #08111f;
    }

    .caption {
      position: absolute;
      left: 14px;
      bottom: 14px;
      max-width: min(720px, calc(100% - 28px));
      padding: 10px 12px;
      border: 1px solid rgba(77, 215, 255, 0.24);
      border-radius: 8px;
      background: rgba(7, 17, 31, 0.78);
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.35);
      backdrop-filter: blur(12px);
    }

    .caption-title {
      margin: 0 0 4px;
      font-size: 14px;
      font-weight: 700;
    }

    .caption-body {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.35;
    }

    .buttons {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    button {
      border: 1px solid rgba(77, 215, 255, 0.35);
      border-radius: 8px;
      background: rgba(13, 27, 46, 0.94);
      color: var(--text);
      padding: 8px 11px;
      font: inherit;
      font-size: 13px;
      cursor: pointer;
    }

    button:hover {
      border-color: var(--accent);
      color: white;
    }

    .progress {
      display: flex;
      gap: 5px;
      align-items: center;
      min-width: 90px;
      justify-content: center;
    }

    .dot {
      width: 7px;
      height: 7px;
      border-radius: 999px;
      background: #26445f;
    }

    .dot.active { background: var(--accent-2); }

    @media (max-width: 720px) {
      header, footer {
        align-items: flex-start;
        flex-direction: column;
      }

      .meta, .hint { white-space: normal; }
      .stage { padding: 10px; }
      .caption { position: static; margin-top: 10px; }
      .image-wrap { align-content: center; }
    }
  </style>
</head>
<body>
  <header>
    <div>
      <h1>Meridian Diagram Deck</h1>
      <div class="meta" id="slideMeta"></div>
    </div>
    <div class="hint">Left-click or Right Arrow: next · Right-click or Left Arrow: previous</div>
  </header>

  <main class="stage" id="stage" title="Left-click for next, right-click for previous">
    <div class="image-wrap">
      <img id="diagram" alt="">
      <section class="caption">
        <p class="caption-title" id="captionTitle"></p>
        <p class="caption-body" id="captionBody"></p>
      </section>
    </div>
  </main>

  <footer>
    <div class="buttons">
      <button id="prevBtn" type="button">Previous</button>
      <button id="nextBtn" type="button">Next</button>
    </div>
    <div class="progress" id="progress"></div>
    <div class="meta" id="filename"></div>
  </footer>

  <script>
    const slides = [
      {
        title: '00 · Meridian Architecture: UI Entry + Model Harness',
        src: 'assets/diagrams/01-meridian-topology-ui-entry-model-harness.png',
        body: 'Exact original architecture image with the remote model area patched to Remote Model Harness / Model Adapters, and routing through the Tool Harness.',
      },
    ];

    let index = 0;

    const stage = document.getElementById('stage');
    const image = document.getElementById('diagram');
    const slideMeta = document.getElementById('slideMeta');
    const captionTitle = document.getElementById('captionTitle');
    const captionBody = document.getElementById('captionBody');
    const filename = document.getElementById('filename');
    const progress = document.getElementById('progress');

    function render() {
      const slide = slides[index];
      image.src = slide.src;
      image.alt = slide.title;
      captionTitle.textContent = slide.title;
      captionBody.textContent = slide.body;
      slideMeta.textContent = `Slide ${index + 1} of ${slides.length}`;
      filename.textContent = slide.src;
      progress.innerHTML = '';
      slides.forEach((_, i) => {
        const dot = document.createElement('span');
        dot.className = `dot${i === index ? ' active' : ''}`;
        progress.appendChild(dot);
      });
    }

    function next() {
      index = (index + 1) % slides.length;
      render();
    }

    function previous() {
      index = (index - 1 + slides.length) % slides.length;
      render();
    }

    stage.addEventListener('click', next);
    stage.addEventListener('contextmenu', (event) => {
      event.preventDefault();
      previous();
    });

    document.getElementById('nextBtn').addEventListener('click', (event) => {
      event.stopPropagation();
      next();
    });

    document.getElementById('prevBtn').addEventListener('click', (event) => {
      event.stopPropagation();
      previous();
    });

    window.addEventListener('keydown', (event) => {
      if (event.key === 'ArrowRight' || event.key === ' ') next();
      if (event.key === 'ArrowLeft') previous();
      if (event.key === 'Home') { index = 0; render(); }
      if (event.key === 'End') { index = slides.length - 1; render(); }
    });

    render();
  </script>
</body>
</html>
