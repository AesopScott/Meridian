<!DOCTYPE html>
<html lang="en"><head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Bifrost Cockpit - Meridian</title>
<style>
*, *::before, *::after { box-sizing: border-box; }

html,
body {
  width: 100%;
  min-height: 100%;
}

body {
  margin: 0;
  min-height: 100vh;
  overflow: hidden;
  background: #000;
  color: #dffbff;
  font-family: "Cascadia Code", "JetBrains Mono", monospace;
}

.harness-screen {
  --harness-width: min(1120px, calc(100vw - 48px));
  --harness-left: calc(24px + ((100vw - 48px - var(--harness-width)) / 2));
  min-height: 100vh;
  display: grid;
  align-items: end;
  position: relative;
  padding: 24px 24px 34px;
  background:
    radial-gradient(circle at 50% 88%, rgba(35, 220, 255, 0.09), transparent 34rem),
    #000;
}

.brand-lockup {
  position: absolute;
  left: max(18px, calc(var(--harness-left) - 180px));
  top: 28px;
  z-index: 3;
  width: min(430px, calc(100vw - 36px));
  isolation: isolate;
}

.brand-primary {
  display: block;
}

.brand-copy {
  min-width: 0;
  text-align: center;
}

.brand-name {
  font-family: "Segoe UI", "Inter", system-ui, sans-serif;
  font-size: clamp(37px, 4.8vw, 54px);
  font-weight: 800;
  line-height: 0.9;
  letter-spacing: 0;
  color: var(--cyan);
  background: linear-gradient(90deg, #41d9ff 0%, #64f6ff 28%, #5d9dff 52%, #38e9ff 76%, #41d9ff 100%);
  background-size: 240% 100%;
  background-clip: text;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  text-shadow: 0 0 18px rgba(65, 217, 255, 0.24);
  animation: brand-name-aqua-flow 28s ease-in-out infinite;
}

.brand-tagline {
  margin-top: 4px;
  font-family: "Cascadia Code", "JetBrains Mono", monospace;
  font-size: clamp(14px, 1.68vw, 22px);
  line-height: 1.1;
  letter-spacing: 0.04em;
  white-space: nowrap;
  background: linear-gradient(90deg, #41d9ff 0%, #64f6ff 28%, #5d9dff 52%, #38e9ff 76%, #41d9ff 100%);
  background-size: 240% 100%;
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
  animation: brand-tagline-color-flow 28s ease-in-out infinite;
}

.speech-mode-button {
  position: absolute;
  right: 28px;
  top: 28px;
  z-index: 4;
  width: 46px;
  height: 46px;
  display: grid;
  place-items: center;
  border: 1px solid rgba(255, 84, 84, 0.62);
  background:
    linear-gradient(135deg, rgba(255, 84, 84, 0.1), rgba(20, 4, 8, 0.22)),
    radial-gradient(circle at 50% 50%, rgba(255, 84, 84, 0.1), transparent 60%);
  clip-path: polygon(50% 0, 100% 50%, 50% 100%, 0 50%);
  color: #dffbff;
  padding: 8px;
  cursor: pointer;
  outline: none;
  box-shadow:
    0 0 12px rgba(255, 84, 84, 0.24),
    inset 0 0 12px rgba(255, 84, 84, 0.08);
  transition: border-color 140ms ease, background 140ms ease, box-shadow 140ms ease;
}

.speech-mode-button::after {
  content: "";
  position: absolute;
  right: 4px;
  top: 4px;
  width: 7px;
  height: 7px;
  background: #ff5454;
  box-shadow: 0 0 8px rgba(255, 84, 84, 0.9);
  clip-path: polygon(50% 0, 100% 50%, 50% 100%, 0 50%);
}

.speech-mode-button::before {
  content: attr(data-status-copy);
  position: absolute;
  top: calc(100% + 8px);
  right: -8px;
  min-width: 112px;
  max-width: 144px;
  padding: 4px 7px;
  border: 1px solid rgba(255, 84, 84, 0.28);
  background: rgba(2, 8, 14, 0.94);
  color: rgba(223, 251, 255, 0.86);
  font-size: 10px;
  line-height: 1.25;
  letter-spacing: 0;
  text-transform: uppercase;
  text-align: center;
  white-space: normal;
  pointer-events: none;
}

.speech-mode-button svg {
  width: 100%;
  height: 100%;
  fill: none;
  stroke: rgba(255, 112, 112, 0.95);
  stroke-width: 2.2;
  stroke-linecap: round;
  stroke-linejoin: round;
  filter: drop-shadow(0 0 7px rgba(255, 84, 84, 0.54));
  transition: filter 140ms ease, stroke 140ms ease, transform 140ms ease;
}

.speech-mode-button[aria-pressed="true"] {
  border-color: rgba(79, 255, 147, 0.68);
  background:
    linear-gradient(135deg, rgba(79, 255, 147, 0.12), rgba(3, 20, 12, 0.24)),
    radial-gradient(circle at 50% 50%, rgba(79, 255, 147, 0.12), transparent 60%);
  box-shadow:
    0 0 14px rgba(79, 255, 147, 0.3),
    inset 0 0 12px rgba(79, 255, 147, 0.08);
}

.speech-mode-button[aria-pressed="true"]::after {
  background: #4fff93;
  box-shadow: 0 0 9px rgba(79, 255, 147, 0.95);
}

.speech-mode-button[aria-pressed="true"] svg {
  stroke: rgba(157, 255, 194, 0.96);
  filter: drop-shadow(0 0 8px rgba(79, 255, 147, 0.62));
}

.speech-mode-button:hover,
.speech-mode-button:focus-visible {
  border-color: rgba(223, 251, 255, 0.72);
}

.speech-mode-button:hover svg,
.speech-mode-button:focus-visible svg {
  stroke: #dffbff;
  transform: scale(1.08);
  filter: drop-shadow(0 0 12px currentColor);
}

.date-orb {
  position: absolute;
  left: 50%;
  top: 22px;
  z-index: 8;
  width: 118px;
  height: 118px;
  transform: translateX(-50%);
  color: #dffbff;
  border-radius: 50%;
  background: radial-gradient(circle, #000 0 64%, rgba(0, 0, 0, 0.96) 65% 100%);
  filter:
    drop-shadow(0 0 10px rgba(87, 239, 255, 0.34))
    drop-shadow(0 0 24px rgba(87, 239, 255, 0.14));
  pointer-events: none;
  isolation: isolate;
}

.date-orb::before {
  content: "";
  position: absolute;
  inset: -9px;
  border-radius: 50%;
  background: conic-gradient(
    from 0deg,
    #ff3d7f,
    #ffb000,
    #fff45c,
    #56ff8a,
    #39f7ff,
    #5d9dff,
    #b264ff,
    #ff3d7f
  );
  opacity: 0;
  transform: scale(0.78);
  filter: blur(1px) drop-shadow(0 0 14px rgba(87, 239, 255, 0.4));
  mask: radial-gradient(circle, transparent 57%, #000 59% 65%, transparent 68%);
  pointer-events: none;
}

.date-orb-svg {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  overflow: visible;
}

.date-orb-outer,
.date-orb-inner,
.date-orb-tick-ring,
.date-orb-hour-fill,
.date-orb-slick-track {
  fill: none;
  stroke-linecap: round;
}

.date-orb-outer {
  stroke: rgba(87, 239, 255, 0.8);
  stroke-width: 2;
}

.date-orb-inner {
  stroke: rgba(87, 239, 255, 0.42);
  stroke-width: 1.5;
}

.date-orb-tick-ring {
  stroke: rgba(87, 239, 255, 0.22);
  stroke-width: 7;
  stroke-dasharray: 1 8;
}

.date-orb-slick-track {
  stroke: rgba(87, 239, 255, 0.13);
  stroke-width: 10;
  stroke-dasharray: 18 82;
  transform: rotate(-90deg);
  transform-origin: 60px 60px;
}

.date-orb-hour-fill {
  stroke: rgba(57, 247, 255, 0.68);
  stroke-width: 7;
  stroke-dasharray: var(--date-hour-progress, 0 100);
  stroke-dashoffset: 0;
  transform: rotate(-90deg);
  transform-origin: 60px 60px;
  filter:
    drop-shadow(0 0 6px rgba(87, 239, 255, 0.7))
    drop-shadow(0 0 12px rgba(87, 239, 255, 0.28));
  transition: stroke-dasharray 420ms linear;
}

.date-orb.is-countdown {
  animation: date-orb-countdown-pulse var(--date-pulse-duration, 1400ms) ease-in-out infinite;
}

.date-orb.is-countdown .date-orb-outer,
.date-orb.is-countdown .date-orb-inner,
.date-orb.is-countdown .date-orb-tick-ring,
.date-orb.is-countdown .date-orb-hour-fill,
.date-orb.is-countdown .date-orb-cut,
.date-orb.is-countdown .date-orb-hour,
.date-orb.is-countdown .date-orb-copy {
  animation: date-orb-color-pressure var(--date-pulse-duration, 1400ms) ease-in-out infinite;
}

.date-orb.is-hour-burst::before {
  animation: date-orb-rainbow-burst 1.8s ease-out;
}

.date-orb-cut {
  fill: none;
  stroke: rgba(223, 251, 255, 0.72);
  stroke-width: 2;
  stroke-linecap: round;
  filter: drop-shadow(0 0 5px rgba(87, 239, 255, 0.56));
}

.date-orb-hour {
  fill: #dffbff;
  stroke: rgba(87, 239, 255, 0.54);
  stroke-width: 0.8;
  paint-order: stroke fill;
  font-family: "Segoe UI", "Inter", system-ui, sans-serif;
  font-size: calc(22px * var(--date-hour-scale, 1));
  font-weight: 900;
  text-anchor: middle;
  dominant-baseline: middle;
  filter:
    drop-shadow(0 0 7px rgba(87, 239, 255, 0.86))
    drop-shadow(0 0 12px rgba(87, 239, 255, 0.38));
  transition: font-size 220ms ease;
}

.date-orb.is-q1 .date-orb-cut-2,
.date-orb.is-q2 .date-orb-cut-3,
.date-orb.is-q3 .date-orb-cut-4 {
  stroke: #39f7ff;
  stroke-width: 3;
  filter:
    drop-shadow(0 0 7px rgba(87, 239, 255, 0.9))
    drop-shadow(0 0 12px rgba(87, 239, 255, 0.44));
}

.date-orb-copy {
  position: absolute;
  inset: 0;
  display: grid;
  place-content: center;
  text-align: center;
  text-transform: uppercase;
  text-shadow: 0 0 9px rgba(87, 239, 255, 0.78);
}

.date-orb-month {
  font-size: 9px;
  line-height: 1;
  letter-spacing: 0.16em;
  color: rgba(185, 251, 255, 0.82);
}

.date-orb-day {
  margin-top: 4px;
  color: #dffbff;
  font-family: "Segoe UI", "Inter", system-ui, sans-serif;
  font-size: 31px;
  font-weight: 800;
  line-height: 0.9;
  letter-spacing: 0;
}

.spark-stage {
  position: absolute;
  left: 50%;
  top: 50%;
  width: min(468px, 62.4vw);
  transform: translate(-50%, -54%);
  z-index: 2;
}

.spark-stage::after {
  content: "";
  position: absolute;
  left: -116px;
  right: -116px;
  top: -116px;
  bottom: -116px;
  z-index: 0;
  pointer-events: none;
}

.spark-icon-strikes {
  position: absolute;
  inset: 0;
  z-index: 6;
  overflow: visible;
  pointer-events: none;
  opacity: 0;
  mix-blend-mode: screen;
  transition: opacity 120ms ease;
}

.spark-stage.spark-menu-open .spark-icon-strikes,
.spark-stage:focus-within .spark-icon-strikes {
  opacity: 1;
}

.spark-icon-bolt-main,
.spark-icon-bolt-fork {
  fill: none;
  stroke-linecap: round;
  stroke-linejoin: round;
  vector-effect: non-scaling-stroke;
}

.spark-icon-bolt-main {
  stroke: var(--bolt-color, #57efff);
  stroke-width: 1.7;
  filter: drop-shadow(0 0 4px var(--bolt-color, #57efff)) drop-shadow(0 0 12px rgba(87, 239, 255, 0.62));
  animation: spark-icon-bolt-main 260ms ease-out forwards;
}

.spark-icon-bolt-fork {
  stroke: var(--bolt-fork-color, #dffbff);
  stroke-width: 0.95;
  opacity: 0.82;
  filter: drop-shadow(0 0 7px rgba(223, 251, 255, 0.58));
  animation: spark-icon-bolt-fork 210ms ease-out forwards;
}

@keyframes spark-icon-bolt-main {
  0% { opacity: 0; stroke-dasharray: 0 420; }
  14% { opacity: 1; stroke-dasharray: 180 420; }
  54% { opacity: 0.86; stroke-dasharray: 420 420; }
  100% { opacity: 0; stroke-dasharray: 420 420; }
}

@keyframes spark-icon-bolt-fork {
  0% { opacity: 0; stroke-dasharray: 0 90; }
  26% { opacity: 0.86; stroke-dasharray: 70 90; }
  100% { opacity: 0; stroke-dasharray: 90 90; }
}
.spark-restart-core {
  position: relative;
  z-index: 1;
  display: block;
  width: 100%;
  aspect-ratio: 1;
  border-radius: 50%;
  overflow: hidden;
  isolation: isolate;
  background:
    radial-gradient(circle at 50% 50%, transparent 0 30%, rgba(0, 0, 0, 0.08) 48%, rgba(0, 0, 0, 0.95) 78%),
    url("bifrost/static/media/spark-hud-reference.jpg") center / 139% auto no-repeat;
  box-shadow:
    0 0 0 1px rgba(185, 251, 255, 0.18),
    0 0 28px rgba(87, 239, 255, 0.32),
    0 0 62px rgba(87, 239, 255, 0.14),
    inset 0 0 46px rgba(0, 0, 0, 0.88);
  animation: restart-image-breathe 8.6s ease-in-out infinite, core-drift 13s ease-in-out infinite;
  opacity: 1;
  filter: brightness(0.94) saturate(1.12) contrast(1.05);
  transform-origin: 50% 52%;
  pointer-events: auto;
}

.spark-restart-core::before,
.spark-restart-core::after,
.spark-restart-core .restart-inner-void,
.spark-restart-core .restart-inward-flow,
.spark-restart-core .restart-scan-ring {
  content: "";
  position: absolute;
  left: 50%;
  top: 50%;
  border-radius: 50%;
  transform: translate(-50%, -50%);
  pointer-events: none;
}

.spark-restart-core::before,
.spark-restart-core::after,
.spark-restart-core .restart-inner-void,
.spark-restart-core .restart-inward-flow,
.spark-restart-core .restart-scan-ring {
  display: block;
}

.spark-restart-core::before {
  z-index: 2;
  width: 94%;
  aspect-ratio: 1;
  background:
    repeating-conic-gradient(from -4deg, transparent 0deg 8deg, rgba(223, 251, 255, 0.32) 8deg 8.8deg, rgba(87, 239, 255, 0.24) 8.8deg 10.4deg, transparent 10.4deg 17deg),
    radial-gradient(circle, transparent 0 45%, rgba(87, 239, 255, 0.18) 46% 48%, transparent 49% 100%);
  mask: radial-gradient(circle, transparent 0 24%, rgba(0, 0, 0, 0.45) 25% 52%, #000 53% 88%, transparent 89%);
  filter: drop-shadow(0 0 9px rgba(87, 239, 255, 0.46));
  animation: restart-inward-clean 5.8s ease-in-out infinite, restart-ring-spin 54s linear infinite;
}

.spark-restart-core::after {
  z-index: 5;
  width: 27%;
  aspect-ratio: 1;
  background:
    radial-gradient(circle, #000 0 58%, rgba(1, 10, 14, 0.98) 59% 76%, rgba(0, 0, 0, 0.9) 77% 100%);
  box-shadow:
    0 0 0 7px rgba(0, 0, 0, 0.86),
    0 0 20px rgba(87, 239, 255, 0.18),
    inset 0 0 16px #000;
  animation: restart-center-strip-breathe 8.2s ease-in-out infinite;
}

.spark-restart-core .restart-inward-flow,
.spark-restart-core .restart-scan-ring,
.spark-restart-core .restart-inner-void {
  display: none;
}

.spark-restart-core::before {
  z-index: 1;
  width: 82%;
  aspect-ratio: 1;
  background:
    repeating-conic-gradient(from 0deg, rgba(223, 251, 255, 0.72) 0deg 1deg, rgba(87, 239, 255, 0.38) 1deg 1.8deg, transparent 1.8deg 5.6deg),
    radial-gradient(circle, transparent 0 69%, rgba(87, 239, 255, 0.32) 70% 73%, transparent 74%);
  mask: radial-gradient(circle, transparent 0 58%, #000 59% 86%, transparent 87%);
  filter:
    drop-shadow(0 0 8px rgba(87, 239, 255, 0.82))
    drop-shadow(0 0 18px rgba(93, 157, 255, 0.28));
  animation: restart-ring-spin 34s linear infinite, restart-ring-breathe 6.4s ease-in-out infinite;
}

.spark-restart-core::after {
  z-index: 2;
  width: 70%;
  aspect-ratio: 1;
  background:
    repeating-conic-gradient(from 8deg, rgba(87, 239, 255, 0.88) 0deg 4deg, rgba(223, 251, 255, 0.70) 4deg 6deg, transparent 6deg 10deg);
  mask: radial-gradient(circle, transparent 0 74%, #000 75% 83%, transparent 84%);
  filter: drop-shadow(0 0 11px rgba(87, 239, 255, 0.76));
  animation: restart-ring-spin-reverse 24s linear infinite, restart-ring-breathe 5.6s ease-in-out infinite;
}

.spark-restart-core .restart-inward-flow {
  z-index: 3;
  width: 78%;
  aspect-ratio: 1;
  background:
    repeating-conic-gradient(from -2deg, transparent 0deg 9deg, rgba(223, 251, 255, 0.46) 9deg 10deg, rgba(87, 239, 255, 0.34) 10deg 11.4deg, transparent 11.4deg 18deg);
  mask: radial-gradient(circle, transparent 0 20%, rgba(0, 0, 0, 0.28) 21% 45%, #000 46% 78%, transparent 79%);
  filter: drop-shadow(0 0 9px rgba(87, 239, 255, 0.46));
  animation: restart-inward-pulse 4.8s ease-in-out infinite, restart-ring-spin 42s linear infinite;
}

.spark-restart-core .restart-scan-ring {
  z-index: 4;
  width: 53%;
  aspect-ratio: 1;
  border: 1px solid rgba(185, 251, 255, 0.34);
  background:
    conic-gradient(from 0deg, transparent 0 54deg, rgba(185, 251, 255, 0.22) 54deg 61deg, transparent 61deg 180deg, rgba(87, 239, 255, 0.18) 180deg 188deg, transparent 188deg);
  box-shadow:
    inset 0 0 18px rgba(0, 0, 0, 0.8),
    0 0 14px rgba(87, 239, 255, 0.28);
  animation: restart-ring-spin-reverse 18s linear infinite;
}

.spark-restart-core .restart-inner-void {
  z-index: 6;
  width: 24%;
  aspect-ratio: 1;
  background:
    radial-gradient(circle, rgba(0, 0, 0, 1) 0 54%, rgba(1, 10, 14, 0.98) 55% 76%, rgba(0, 0, 0, 0.92) 77% 100%);
  box-shadow:
    0 0 0 5px rgba(0, 0, 0, 0.82),
    0 0 18px rgba(87, 239, 255, 0.22),
    inset 0 0 14px #000;
  animation: restart-void-breathe 7.2s ease-in-out infinite;
}

.core-animation {
  position: relative;
  z-index: 1;
  display: block;
  width: 100%;
  aspect-ratio: 1;
  border-radius: 50%;
  overflow: hidden;
  isolation: isolate;
  background:
    radial-gradient(circle at 50% 50%, rgba(8, 24, 30, 0.96) 0 25%, rgba(3, 10, 14, 0.98) 26% 42%, rgba(0, 0, 0, 1) 43% 100%);
  box-shadow:
    0 0 0 1px rgba(185, 251, 255, 0.22),
    0 0 18px rgba(87, 239, 255, 0.34),
    0 0 48px rgba(87, 239, 255, 0.15),
    inset 0 0 38px rgba(0, 0, 0, 0.94);
  animation: core-drift 11s ease-in-out infinite, spark-base-alive 8.4s ease-in-out infinite;
  transform-origin: 50% 52%;
  pointer-events: auto;
}

.core-animation::before {
  content: "";
  position: absolute;
  inset: 3.5%;
  border-radius: 50%;
  background:
    linear-gradient(112deg, transparent 0 43%, rgba(185, 251, 255, 0.15) 44% 45%, transparent 46% 100%),
    linear-gradient(22deg, transparent 0 54%, rgba(87, 239, 255, 0.12) 55% 56%, transparent 57% 100%);
  opacity: 0.72;
  filter: drop-shadow(0 0 7px rgba(87, 239, 255, 0.26));
  animation: spark-glass-sweep 17s ease-in-out infinite;
}
.core-animation::after {
  content: "";
  position: absolute;
  left: 50%;
  top: 50%;
  z-index: 2;
  width: var(--spark-splash-size, 86%);
  aspect-ratio: 1;
  border-radius: 50%;
  transform: translate(-50%, -50%);
  background:
    repeating-conic-gradient(from var(--spark-splash-angle, -2deg), rgba(223, 251, 255, 0.88) 0deg var(--spark-splash-width, 0.8deg), rgba(87, 239, 255, 0.54) var(--spark-splash-width, 0.8deg) calc(var(--spark-splash-width, 0.8deg) + 0.9deg), transparent calc(var(--spark-splash-width, 0.8deg) + 0.9deg) var(--spark-splash-gap, 9deg)),
    radial-gradient(circle, transparent 0 61%, rgba(87, 239, 255, 0.24) 62% 64%, transparent 65% 100%);
  mask: radial-gradient(circle, transparent 0 var(--spark-splash-hole, 66%), #000 calc(var(--spark-splash-hole, 66%) + 1%) var(--spark-splash-reach, 94%), transparent calc(var(--spark-splash-reach, 94%) + 1%) 100%);
  filter:
    drop-shadow(0 0 6px rgba(223, 251, 255, 0.82))
    drop-shadow(0 0 18px rgba(87, 239, 255, 0.44));
  opacity: var(--spark-splash-opacity, 0.82);
  animation: spark-data-splash var(--spark-splash-pulse, 6.4s) ease-in-out infinite, spark-base-spin var(--spark-splash-spin, 54s) linear infinite;
  pointer-events: none;
}

.spark-base-ring,
.spark-base-plus-one,
.spark-plus-ring,
.spark-plus-lens {
  position: absolute;
  left: 50%;
  top: 50%;
  border-radius: 50%;
  transform: translate(-50%, -50%);
  pointer-events: none;
}

.spark-base-ring-outer {
  width: 97%;
  aspect-ratio: 1;
  border: 1px solid rgba(185, 251, 255, 0.35);
  background:
    repeating-conic-gradient(from 2deg, rgba(223, 251, 255, 0.40) 0deg 1deg, transparent 1deg 14deg),
    conic-gradient(from 0deg, transparent 0deg 14deg, rgba(87, 239, 255, 0.16) 14deg 18deg, transparent 18deg 42deg, rgba(93, 157, 255, 0.15) 42deg 46deg, transparent 46deg 360deg);
  mask: radial-gradient(circle, transparent 0 64%, #000 65% 82%, transparent 83% 100%);
  filter: drop-shadow(0 0 9px rgba(87, 239, 255, 0.38));
  animation: spark-base-spin 62s linear infinite;
}

.spark-base-ring-panels {
  width: 86%;
  aspect-ratio: 1;
  background:
    repeating-conic-gradient(from -4deg, rgba(223, 251, 255, 0.25) 0deg 8deg, rgba(10, 24, 29, 0.72) 8deg 12deg, transparent 12deg 20deg),
    radial-gradient(circle, transparent 0 63%, rgba(87, 239, 255, 0.18) 64% 66%, transparent 67% 100%);
  mask: radial-gradient(circle, transparent 0 68%, #000 69% 82%, transparent 83% 100%);
  animation: spark-base-spin-reverse 48s linear infinite;
}

.spark-base-ring-spectrum {
  width: 74%;
  aspect-ratio: 1;
  background:
    repeating-conic-gradient(from 0deg, rgba(223, 251, 255, 0.84) 0deg 0.7deg, rgba(87, 239, 255, 0.42) 0.7deg 1.5deg, transparent 1.5deg 3.6deg),
    radial-gradient(circle, transparent 0 77%, rgba(87, 239, 255, 0.35) 78% 80%, transparent 81%);

.spark-plus-ring-c {

.spark-plus-lens {

.spark-core-center {

  top: 50%;

.spark-mechanical-eye::before {
  content: "";

}

.spark-mechanical-eye::after {

}

.spark-eye-inner-orbit {
  position: absolute;

}

.spark-eye-aperture {
  position: absolute;

  top: 50%;

  height: 74%;

  background:
    radial-gradient(circle at 50% 50%, rgba(10, 26, 38, 0.8) 0 30%, rgba(0, 0, 0, 0.96) 58%),

}

.spark-eye-lens-ring {

  border-radius: 50%;

}

.spark-eye-iris {

  top: 50%;

}

.spark-eye-pupil {
  position: absolute;
  left: 50%;
  top: 50%;
  width: 9px;
  height: 9px;
  border-radius: 50%;

  box-shadow: 0 0 4px rgba(0, 0, 0, 0.9);
}

.spark-eye-glint {
  position: absolute;
  left: 27%;
  top: 23%;
  width: 5px;
  height: 5px;
  border-radius: 50%;
  background: rgba(255, 255, 255, 0.9);
  filter: blur(0.2px);
}

.spark-eye-shutter {
  position: absolute;
  left: 50%;
  z-index: 3;
  top: 50%;
  width: 76%;
  height: 22%;
  background: linear-gradient(90deg, rgba(0, 0, 0, 0.98), rgba(4, 15, 22, 0.98), rgba(0, 0, 0, 0.98));
  border: 1px solid rgba(87, 239, 255, 0.16);
  clip-path: polygon(0 0, 86% 0, 100% 50%, 86% 100%, 0 100%, 12% 50%);
  box-shadow:
    0 0 8px rgba(0, 0, 0, 0.92),
    inset 0 0 6px rgba(87, 239, 255, 0.08);
  transform-origin: 50% 50%;
  animation: spark-eye-shutter-cycle 24s ease-in-out infinite;
}

.spark-eye-shutter-a {
  transform: translate(-50%, -50%) rotate(0deg);
}

.spark-eye-shutter-b {
  transform: translate(-50%, -50%) rotate(120deg);
}

.spark-eye-shutter-c {
  transform: translate(-50%, -50%) rotate(240deg);
}

.spark-core-toggle {
  position: absolute;
  left: 50%;
  top: 50%;
  z-index: 7;
  width: 34%;
  aspect-ratio: 1;
  border: 0;
  background: transparent;
  padding: 0;
  transform: translate(-50%, -50%);
  cursor: pointer;
}

.spark-core-toggle:focus-visible {
  outline: 1px solid rgba(185, 251, 255, 0.55);
  outline-offset: 2px;
}

.spark-menu {
  position: absolute;
  left: 50%;
  top: 50%;
  z-index: 2;
  width: calc(100% + 116px);
  aspect-ratio: 1;
  --spark-ring-radius: calc(((min(360px, 48vw) + 116px) / 2) - 46px);
  padding: 0;
  transform: translate(-50%, -50%) scale(0.86);
  opacity: 0;
  pointer-events: none;
  transition: opacity 150ms ease, transform 150ms ease;
}

.spark-stage.spark-menu-open .spark-menu,
.spark-stage.spark-style-preview .spark-menu,
.spark-stage:focus-within .spark-menu {
  opacity: 1;
  transform: translate(-50%, -50%) scale(1);
}

.spark-menu-icon-button {
  position: absolute;
  left: 50%;
  top: 50%;
  width: 74px;
  height: 64px;
  display: grid;
  grid-template-rows: 15px 1fr;
  justify-items: center;
  align-items: center;
  border: 0;
  background: transparent;
  color: #dffbff;
  padding: 0;
  cursor: pointer;
  outline: none;
  pointer-events: none;
  transform:
    translate(-50%, -50%)
    rotate(calc(var(--slot) * 30deg))
    translateY(calc(var(--spark-ring-radius) * -1))
    rotate(calc(var(--slot) * -30deg));
}

.spark-stage.spark-menu-open .spark-menu-icon-button,
.spark-stage.spark-style-preview .spark-menu-icon-button,
.spark-stage:focus-within .spark-menu-icon-button {
  pointer-events: auto;
}

.spark-action-label {
  display: block;
  max-width: 86px;
  color: rgba(223, 251, 255, 0.9);
  font-size: 8px;
  line-height: 1;
  letter-spacing: 0.08em;
  text-align: center;
  text-transform: uppercase;
  text-shadow: 0 0 8px rgba(87, 239, 255, 0.72);
  white-space: nowrap;
  transform-origin: 50% 100%;
  transition: filter 140ms ease, transform 140ms ease;
}

.spark-menu-icon-button:hover .spark-action-label,
.spark-menu-icon-button:focus-visible .spark-action-label,
.spark-menu-icon-button.is-selected .spark-action-label {
  background: linear-gradient(90deg, #6fb7ff 0%, #57efff 38%, #dffbff 55%, #38d8ff 76%, #6fb7ff 100%);
  background-size: 220% 100%;
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
  transform: scale(2);
  filter:
    drop-shadow(0 0 7px rgba(87, 239, 255, 0.82))
    drop-shadow(0 0 14px rgba(52, 151, 255, 0.44));
  animation: spark-label-aqua-flow 2.8s ease-in-out infinite;
}

.spark-action-icon {
  width: 40px;
  height: 40px;
  fill: none;
  stroke: #57efff;
  stroke-width: 2.3;
  stroke-linecap: round;
  stroke-linejoin: round;
  filter: drop-shadow(0 0 8px rgba(87, 239, 255, 0.5));
  transition: filter 140ms ease, stroke 140ms ease, transform 140ms ease;
}

.spark-menu-icon-button:hover .spark-action-icon,
.spark-menu-icon-button:focus-visible .spark-action-icon,
.spark-menu-icon-button.is-selected .spark-action-icon {
  stroke: #b9fbff;
  transform: scale(1.08);
  filter: drop-shadow(0 0 14px rgba(87, 239, 255, 0.86));
}

.spark-menu-icon-button.is-selected::before {
  content: "";
  position: absolute;
  inset: 3px;
  border: 1px solid rgba(185, 251, 255, 0.36);
  clip-path: polygon(50% 0, 100% 50%, 50% 100%, 0 50%);
  filter: drop-shadow(0 0 8px rgba(87, 239, 255, 0.35));
}

.session-window {
  --session-left: calc(50% + ((min(360px, 48vw) + 116px) / 2) + 10px);
  --session-side-width: min(536px, calc((100vw - min(360px, 48vw) - 116px - 68px) / 2));
  --session-electric: 255, 232, 54;
  --session-electric-soft: 255, 247, 151;
  --session-electric-deep: 255, 194, 28;
  position: absolute;
  top: max(116px, calc(50% - 278px));
  z-index: 5;
  width: var(--session-side-width);
  min-width: 360px;
  height: min(524px, calc(100vh - 210px));
  min-height: 360px;
  display: grid;
  grid-template-rows: 1fr;
  border: 1px solid rgba(var(--session-electric), 0.78);
  background:
    linear-gradient(180deg, rgba(0, 6, 8, 0.96), rgba(0, 5, 7, 0.92)),
    radial-gradient(circle at 0 0, rgba(var(--session-electric), 0.13), transparent 130px);
  box-shadow:
    0 0 3px rgba(var(--session-electric-soft), 0.68),
    0 0 18px rgba(var(--session-electric), 0.32),
    inset 0 0 14px rgba(var(--session-electric), 0.06);
  opacity: 0;
  pointer-events: none;
  transform: translateY(10px) scale(0.985);
  transition: opacity 170ms ease, transform 170ms ease;
  isolation: isolate;
}

.harness-screen.session-theme-aqua .session-window {
  --session-electric: 87, 239, 255;
  --session-electric-soft: 223, 251, 255;
  --session-electric-deep: 93, 157, 255;
}

.harness-screen.session-theme-green .session-window {
  --session-electric: 102, 255, 150;
  --session-electric-soft: 209, 255, 222;
  --session-electric-deep: 42, 219, 111;
}

.harness-screen.sessions-visible .session-window {
  opacity: 1;
  pointer-events: auto;
  transform: translateY(0) scale(1);
}

.harness-screen:has(.harness-dock-wrap.harness-dock-open) .session-window {
  opacity: 0;
  pointer-events: none;
  transform: translateY(10px) scale(0.985);
}

.session-window[data-session-hidden="true"] {
  opacity: 0 !important;
  pointer-events: none !important;
  transform: translateY(10px) scale(0.985) !important;
}

.session-window[data-session-pinned="true"] {
  box-shadow:
    0 0 4px rgba(var(--session-electric-soft), 0.78),
    0 0 22px rgba(var(--session-electric), 0.4),
    inset 0 0 16px rgba(var(--session-electric), 0.08);
}

.harness-screen:has(.harness-dock-wrap.harness-dock-open) .session-window[data-session-pinned="true"] {
  opacity: 1;
  pointer-events: auto;
  transform: translateY(0) scale(1);
}

.session-window-right {
  left: var(--session-left);
}

.session-window-left {
  right: calc(50% + ((min(360px, 48vw) + 116px) / 2) + 10px);
}

.harness-screen[data-session-band-side="left"] .session-window-right {
  left: auto;
  right: calc(50% + ((min(360px, 48vw) + 116px) / 2) + 10px);
}

.harness-screen[data-session-band-side="left"] .session-window-left {
  right: auto;
  left: var(--session-left);
}

.session-window-left::after {
  left: auto;
  right: 15px;
}

.session-window::before {
  content: "";
  position: absolute;
  left: 10px;
  top: 9px;
  right: 10px;
  bottom: 10px;
  border: 1px solid rgba(var(--session-electric), 0.28);
  box-shadow: inset 0 0 9px rgba(var(--session-electric), 0.07);
  pointer-events: none;
}

.session-window::after {
  content: "";
  position: absolute;
  left: 15px;
  top: 40px;
  width: 4px;
  height: calc(100% - 82px);
  background: linear-gradient(180deg, rgba(var(--session-electric), 0.84), rgba(var(--session-electric), 0.22) 48%, rgba(var(--session-electric-deep), 0.8));
  box-shadow: 0 0 10px rgba(var(--session-electric), 0.58);
  pointer-events: none;
}

.session-title {
  position: absolute;
  left: 14px;
  top: -13px;

  line-height: 1;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  text-shadow: 0 0 7px rgba(var(--session-electric), 0.78);
}

.session-title::after {
  content: "";
  position: absolute;
  left: calc(100% + 8px);
  top: 50%;
  width: 96px;
  height: 1px;
  background: rgba(var(--session-electric), 0.58);
  box-shadow: 0 0 7px rgba(var(--session-electric), 0.5);

.session-project-select {
  position: absolute;
  right: 51px;
  top: -33px;

  height: 20px;

  border-radius: 0;

  line-height: 1;
  letter-spacing: 0.08em;

}

.session-project-select:focus {

}

.session-model-select {
  position: absolute;
  right: 51px;
  top: -59px;
  z-index: 3;
  width: 142px;
  height: 20px;
  border: 1px solid rgba(var(--session-electric), 0.58);
  border-radius: 0;
  background: rgba(0, 0, 0, 0.92);
  color: rgba(var(--session-electric-soft), 0.94);
  font-size: 9px;
  line-height: 1;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  padding: 1px 22px 1px 7px;
  outline: none;
  box-shadow:
    0 0 8px rgba(var(--session-electric), 0.28),
    inset 0 0 8px rgba(var(--session-electric), 0.05);
}

.session-model-select:focus {
  border-color: rgba(var(--session-electric-soft), 0.88);
}

.session-target-select {
  position: absolute;
  right: 51px;
  top: -33px;
  z-index: 3;
  width: 178px;
  height: 20px;
  border: 1px solid rgba(var(--session-electric), 0.58);
  border-radius: 0;
  background: rgba(0, 0, 0, 0.92);
  color: rgba(var(--session-electric-soft), 0.94);
  font-size: 9px;
  line-height: 1;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  padding: 1px 22px 1px 7px;
  outline: none;
  box-shadow:
    0 0 8px rgba(var(--session-electric), 0.28),
    inset 0 0 8px rgba(var(--session-electric), 0.05);
}

.session-target-select:focus {
  border-color: rgba(var(--session-electric-soft), 0.88);
}

.session-window-right.is-panel-surface .session-target-select {
  display: none;
}

.session-window[data-session-size="compact"] {
  width: min(440px, var(--session-side-width));
}

.session-window[data-session-size="wide"] {
  width: min(620px, calc(var(--session-side-width) + 84px));

.instrumentation-band {
  position: absolute;
  left: 24px;
  right: 24px;

  pointer-events: none;

.instrumentation-band-cell {
  min-height: 58px;
  border: 1px solid rgba(87, 239, 255, 0.28);

  box-shadow:

.instrumentation-band-label {

.instrumentation-band-value {

.instrumentation-band-detail {

.session-corner-plus {

  content: "";

.session-corner-plus::before {
  left: 0;
  top: 6px;
  width: 13px;
  height: 1px;
}

.session-corner-plus::after {
  left: 6px;
  top: 0;
  width: 1px;
  height: 13px;
}

.session-window-left .session-corner-plus {

.session-outside-icons {

  gap: 6px;
}

.session-window-left .session-top-icons {
  right: auto;
  left: 0;
}

.session-window-left .session-top-icons .session-outside-icon:nth-child(1) {
  order: 4;
}

.session-window-left .session-top-icons .session-outside-icon:nth-child(2) {
  order: 3;
}

.session-window-left .session-top-icons .session-outside-icon:nth-child(3) {

.session-window-left .session-top-icons .session-outside-icon:nth-child(4) {

<script>
(() => {
  const cleanReloadMarker = () => {
    const url = new URL(window.location.href);
    if (!url.searchParams.has('meridian_reload')) return false;
    url.searchParams.delete('meridian_reload');
    window.history.replaceState({}, document.title, `${url.pathname}${url.search}${url.hash}`);
    return true;
  };
  window.meridianReloadMarkerPresent = cleanReloadMarker();
  const orb = document.querySelector('.date-orb');
  const month = document.querySelector('.date-orb-month');
  const day = document.querySelector('.date-orb-day');
  const hour = document.querySelector('.date-orb-hour');
  if (!orb || !month || !day || !hour) return;
  let lastHourKey = null;
  let hasRenderedDate = false;
  let burstTimer = null;
  const renderDate = () => {
    const now = new Date();
    month.textContent = now.toLocaleString(undefined, { month: 'short' }).toUpperCase();
    day.textContent = String(now.getDate()).padStart(2, '0');
    const hour12 = now.getHours() % 12 || 12;
    const elapsedSeconds = (now.getMinutes() * 60) + now.getSeconds();
    const hourProgress = elapsedSeconds / 3600 * 100;
    const hourGrowth = 1 + (Math.floor(now.getMinutes() / 10) * 0.1);
    const secondsToHour = 3600 - elapsedSeconds;
    const hourKey = `${now.getFullYear()}-${now.getMonth()}-${now.getDate()}-${now.getHours()}`;
    hour.textContent = String(hour12);
    orb.style.setProperty('--date-hour-progress', `${hourProgress.toFixed(2)} 100`);
    orb.style.setProperty('--date-hour-scale', hourGrowth.toFixed(2));
    if (secondsToHour > 0 && secondsToHour <= 30) {
      const urgency = (30 - secondsToHour) / 30;
      const pulseDuration = Math.round(1500 - (urgency * 1180));
      orb.style.setProperty('--date-pulse-duration', `${pulseDuration}ms`);
      orb.classList.add('is-countdown');
    } else {
      orb.classList.remove('is-countdown');
    }
    if (lastHourKey !== null && hourKey !== lastHourKey && hasRenderedDate) {
      orb.classList.remove('is-hour-burst');
      void orb.offsetWidth;
      orb.classList.add('is-hour-burst');
      window.clearTimeout(burstTimer);
      burstTimer = window.setTimeout(() => orb.classList.remove('is-hour-burst'), 1900);
    }
    lastHourKey = hourKey;
    hasRenderedDate = true;
    orb.classList.toggle('is-q1', hourProgress >= 25);
    orb.classList.toggle('is-q2', hourProgress >= 50);
    orb.classList.toggle('is-q3', hourProgress >= 75);
  };
  renderDate();
  window.setInterval(renderDate, 1000);
})();
(() => {
  const screen = document.querySelector('.harness-screen');
  const primeWindow = document.querySelector('.session-window-left');
  const userWindow = document.querySelector('.session-window-right');
  const sessionWindows = Array.from(document.querySelectorAll('.session-window'));
  if (!screen || !sessionWindows.length) return;
  if (primeWindow && !primeWindow.querySelector('.session-model-select')) {
    primeWindow.insertAdjacentHTML('afterbegin', `
      <select class="session-model-select" aria-label="Models">
        <option value="codex" selected>Codex</option>
        <option value="max">Max</option>
        <option value="auto" disabled>Auto</option>
      </select>
    `);
  }
  if (userWindow && !userWindow.querySelector('.session-target-select')) {
    userWindow.insertAdjacentHTML('afterbegin', `
      <select class="session-target-select" aria-label="User Sessions">
        <option value="">Sessions loading</option>
      </select>
    `);
  }
  sessionWindows.forEach((windowEl) => {
    const workspace = windowEl.querySelector('.session-workspace');
    if (!workspace || workspace.querySelector('.session-interface')) return;
    workspace.removeAttribute('aria-hidden');
    const isUser = windowEl.classList.contains('session-window-right');
    workspace.insertAdjacentHTML('afterbegin', `
      <div class="session-interface" aria-label="${isUser ? 'User' : 'Prime'} session interface">
        <textarea class="session-prompt-input" aria-label="${isUser ? 'User prompt input' : 'Prime prompt input'}" spellcheck="false"></textarea>
        <div class="session-attachment-tray" aria-label="${isUser ? 'User attachments' : 'Prime attachments'}">
          <button class="session-attachment-upload" type="button">Upload</button>
          <input class="session-attachment-input" type="file" multiple accept="image/*,.txt,.md,.markdown,.json,.csv,.tsv,.log,.pdf,.doc,.docx,.rtf,.html,.htm" aria-label="${isUser ? 'Upload User context files' : 'Upload Prime context files'}">
        </div>
        <div class="session-response-output" aria-label="${isUser ? 'User response output' : 'Prime response output'}"></div>
        <div class="session-model-status" aria-live="polite"></div>
      </div>
    `);
  });

  document.querySelector('.session-window-right .session-text-slider')?.remove();
  const textSliders = Array.from(document.querySelectorAll('.session-text-slider input[type="range"]'));
  const textSizeKey = 'meridian.session.text-size';
  const readStoredTextSize = () => {
    try {
      return localStorage.getItem(textSizeKey);
    } catch {
      return null;
    }
  };
  const writeStoredTextSize = (value) => {
    try {
      localStorage.setItem(textSizeKey, String(value));
    } catch {
      // Text sizing still applies for the current page when storage is unavailable.
    }
  };
  const setTextSize = (value) => {
    const rawValue = Number(value);
    const sliderValue = Number.isFinite(rawValue) ? Math.min(100, Math.max(0, rawValue)) : 0;
    const fontSize = 10 + (sliderValue / 100) * 18;
    screen.style.setProperty('--session-text-size', `${fontSize.toFixed(1)}px`);
    textSliders.forEach((slider) => {
      slider.value = String(sliderValue);
    });
    writeStoredTextSize(sliderValue);
  };
  textSliders.forEach((slider) => {
    slider.removeAttribute('tabindex');
    slider.setAttribute('aria-label', 'Session text size');
    slider.addEventListener('input', () => setTextSize(slider.value));
    slider.addEventListener('change', () => setTextSize(slider.value));
  });
  setTextSize(readStoredTextSize() ?? textSliders[0]?.value ?? 0);

  const modelSelect = document.querySelector('.session-model-select');
  const projectSelect = document.querySelector('.session-project-select');
  const projectSelectKey = 'meridian.session.project';
  const projectOptions = ['Bifrost', 'Meridian', 'Spark'];
  const activeProjectContext = () => projectSelect?.value || 'Meridian';
  let lastProjectValue = '';
  const hasUnsentPromptDraft = () => Array.from(document.querySelectorAll('.session-prompt-input'))
    .some((input) => String(input.value || '').trim().length > 0);
  const confirmProjectSwitchIfNeeded = (nextProject) => {
    if (!lastProjectValue || nextProject === lastProjectValue || !hasUnsentPromptDraft()) return true;
    return window.confirm('Switch project context? Unsent prompt drafts will be preserved, but the visible Compass context and project-grouped session list will change.');
  };
  const updateProjectContextAuthority = () => {
    const project = activeProjectContext();
    window.meridianActiveProject = project;
    screen.dataset.projectContext = project;
    if (primeWindow) primeWindow.dataset.projectContext = project;
    if (projectSelect) {
      projectSelect.dataset.projectContext = project;
      projectSelect.title = `Compass project context: ${project}. User Session target is selected separately.`;
    }
  };
  if (projectSelect) {
    const storedProject = localStorage.getItem(projectSelectKey);
    projectSelect.replaceChildren();
    const placeholder = document.createElement('option');
    placeholder.value = '';
    placeholder.disabled = true;
    placeholder.textContent = 'Projects';
    projectSelect.append(placeholder);
    projectOptions.slice().sort((a, b) => a.localeCompare(b)).forEach((project) => {
      const option = document.createElement('option');
      option.value = project;
      option.textContent = project;
      projectSelect.append(option);
    });
    projectSelect.value = projectOptions.includes(storedProject) ? storedProject : 'Meridian';
    lastProjectValue = projectSelect.value;
    localStorage.setItem(projectSelectKey, projectSelect.value);
    updateProjectContextAuthority();
    projectSelect.addEventListener('change', () => {
      const nextProject = projectSelect.value || 'Meridian';
      if (!confirmProjectSwitchIfNeeded(nextProject)) {
        projectSelect.value = lastProjectValue || 'Meridian';
        updateProjectContextAuthority();
        return;
      }
      localStorage.setItem(projectSelectKey, projectSelect.value || 'Meridian');
      lastProjectValue = projectSelect.value || 'Meridian';
      updateProjectContextAuthority();
      renderUserSessionSelect();
      updatePrimeProjectStatus();
      refreshProjectScopedSurfaces();
    });
  } else {
    updateProjectContextAuthority();
  }
  if (modelSelect) {
    const storedModel = localStorage.getItem('meridian.session.model');
    modelSelect.value = storedModel === 'auto' ? 'codex' : (storedModel || modelSelect.value || 'codex');
    if (storedModel === 'auto') localStorage.setItem('meridian.session.model', 'codex');
    modelSelect.addEventListener('change', () => {
      localStorage.setItem('meridian.session.model', modelSelect.value || 'codex');
      updateModelReadiness();
    });
  }
  let modelReadiness = [];
  let bridgeCapabilities = {};
  let bridgeOnline = false;
  let userSessions = [];
  let userSessionsLoadFailed = false;
  const userSessionTargetKey = 'meridian.user-session.target.v1';
  const userSessionSelect = document.querySelector('.session-target-select');
  const localBridgeBase = 'http://127.0.0.1:8767/bridge';
  const bridgeUrl = (path) => `${localBridgeBase}/${String(path || '').replace(/^\/+/, '')}`;
  const expectedBridgeVersion = 'local-bridge-routes-v4';
  const pathPattern = /((?:[A-Za-z]:\\|\.{0,2}[\\/])(?:[\w .()@%+=~-]+[\\/])*[\w .()@%+=~-]+\.[A-Za-z0-9]{1,12}|(?:[\w@%+=~-]+[\\/])+(?:[\w .()@%+=~-]+)(?:\.[A-Za-z0-9]{1,12})?|\b[\w@%+=~-]+\.[A-Za-z0-9]{1,12}\b)/g;
  const speechButton = document.querySelector('.speech-mode-button');
  const voiceStateLabel = (voice = {}) => {
    if (voice.blocked) return 'blocked';
    if (voice.speaking) return 'speaking';
    if (voice.thinking) return 'thinking';
    if (voice.dictating) return 'dictating';
    if (voice.listening) return 'listening';
    return 'unavailable';
  };
  const speechButtonDisabledReason = (snapshot = {}, voice = {}) => {
    if (!snapshot?.ok) return 'Voice I/O snapshot unavailable';
    if (voice.blocked) return 'Voice interaction blocked by reviewed backend state';
    if (!snapshot.microphone_authorized) return 'Mic unavailable: microphone permission not authorized';
    if (!snapshot.speech_output_authorized && !snapshot.read_aloud_authorized) {
      return 'Voice output unavailable: speech output backend not authorized';
    }
    if (snapshot.controls_disabled) return 'Voice controls are display-only in this build';
    return 'Voice capture inactive';
  };
  const speechButtonStatusCopy = (snapshot = {}, voice = {}) => {
    if (!snapshot?.ok) return 'Voice offline';
    if (voice.blocked) return 'Voice blocked';
    if (!snapshot.microphone_authorized) return 'Mic unavailable';
    if (!snapshot.speech_output_authorized && !snapshot.read_aloud_authorized) return 'Output unavailable';
    if (snapshot.controls_disabled) return 'Display only';
    return snapshot.microphone_authorized && voice.listening ? 'Mic active' : 'Voice ready';
  };
  const applySpeechButtonVoiceState = (snapshot = {}) => {
    if (!speechButton) return;
    const voice = snapshot.voice || {};
    const state = snapshot.ok ? voiceStateLabel(voice) : 'unavailable';
    const disabledReason = speechButtonDisabledReason(snapshot, voice);
    const statusCopy = speechButtonStatusCopy(snapshot, voice);
    const authorized = Boolean(
      snapshot.microphone_authorized ||
      snapshot.speech_output_authorized ||
      snapshot.read_aloud_authorized,
    );
    speechButton.dataset.voiceState = state;
    speechButton.dataset.captureState = snapshot.microphone_authorized && voice.listening ? 'capturing' : 'not-capturing';
    speechButton.dataset.disabledReason = disabledReason;
    speechButton.dataset.statusCopy = statusCopy;
    speechButton.setAttribute('aria-label', `Speech mode ${state}`);
    speechButton.title = disabledReason;
    speechButton.setAttribute('aria-pressed', state !== 'unavailable' && state !== 'blocked' ? 'true' : 'false');
    speechButton.setAttribute('aria-disabled', 'true');
    speechButton.disabled = true;
    if (authorized) speechButton.dataset.voiceAuthorization = 'backend-authorized';
    else speechButton.dataset.voiceAuthorization = 'display-only';
  };
  const refreshSpeechButtonVoiceState = async () => {
    if (!speechButton) return;
    try {
      const response = await fetch(bridgeUrl('voice-io'), { cache: 'no-store' });
      const snapshot = await response.json();
      applySpeechButtonVoiceState(snapshot);
    } catch {
      applySpeechButtonVoiceState({ ok: false });
    }
  };
  const selectedUserSessionId = () => userSessionSelect?.value || '';
  const selectedUserSession = () => userSessions.find((session) => session.sessionId === selectedUserSessionId()) || null;
  const sessionScope = (input) => {
    const windowEl = input.closest('.session-window');
    if (!windowEl?.classList.contains('session-window-right')) return 'prime';
    return `user.${selectedUserSessionId() || 'unselected'}`;
  };
  const transcriptKey = (input) => {
    return `meridian.session.transcript.${sessionScope(input)}`;
  };
  const draftKey = (input) => {
    return `meridian.session.prompt.${sessionScope(input)}`;
  };
  const sessionChannel = (input) => {
    const windowEl = input.closest('.session-window');
    return windowEl?.classList.contains('session-window-right') ? 'user' : 'prime';
  };
  const readTranscript = (input) => {
    try {
      return JSON.parse(localStorage.getItem(transcriptKey(input)) || '[]');
    } catch {
      return [];
    }
  };
  const writeTranscript = (input, entries) => {
    localStorage.setItem(transcriptKey(input), JSON.stringify(entries.slice(-80)));
  };
  const renderOutputFragments = (text) => {
    const value = String(text || '');
    const fragments = [];
    let lastIndex = 0;
    for (const match of value.matchAll(pathPattern)) {
      if (match.index > lastIndex) fragments.push(document.createTextNode(value.slice(lastIndex, match.index)));
      const span = document.createElement('span');
      span.className = 'session-output-path';
      span.textContent = match[0];
      fragments.push(span);
      lastIndex = match.index + match[0].length;
    }
    if (lastIndex < value.length) fragments.push(document.createTextNode(value.slice(lastIndex)));
    return fragments.length ? fragments : [document.createTextNode(value)];
  };
  const outputFor = (input) => input?.closest('.session-window')?.querySelector('.session-response-output');
  const attachmentTrayFor = (input) => input?.closest('.session-window')?.querySelector('.session-attachment-tray');
  const statusFor = (input) => input?.closest('.session-window')?.querySelector('.session-model-status');
  const userInput = () => userWindow?.querySelector('.session-prompt-input');
  const updateUserSessionTitle = () => {
    const title = userWindow?.querySelector('.session-title');
    const selected = selectedUserSession();
    if (title && !userWindow?.classList.contains('is-panel-surface')) title.textContent = selected ? `User Session: ${selected.sessionName}` : 'User Session';
  };
  const sessionOptionLabel = (session) => {
    const status = session.status && session.status !== 'live' ? ` (${session.status.replaceAll('_', ' ')})` : '';
    return `${session.sessionName}${status}`;
  };
  const userSessionStatusText = () => {
    if (window.meridianRightPanelRecoveryWarning) return window.meridianRightPanelRecoveryWarning;
    if (userSessionsLoadFailed) return 'session list unavailable';
    const selected = selectedUserSession();
    if (!selected && localStorage.getItem(userSessionTargetKey)) return 'selected session unavailable';
    if (!selected) return 'select live session';
    const status = selected.status && selected.status !== 'live' ? ` (${selected.status.replaceAll('_', ' ')})` : '';
    return `target ${selected.sessionName}${status}`;
  };
  const updateUserSessionStatus = () => {
    const input = userInput();
    if (input) setStatus(input, userSessionStatusText());
  };
  const updatePrimeProjectStatus = () => {
    const input = primeWindow?.querySelector('.session-prompt-input');
    if (input) setStatus(input, `Compass project ${activeProjectContext()}`);
  };
  const quickReplyOrderKey = 'meridian.quick-reply-order.v1';
  const quickReplyDefaults = ['Yes', 'No', 'Continue', 'Confirm'];
  const normalizeQuickReplyOrder = (value) => {
    const items = Array.isArray(value)
      ? value
      : String(value || '').split(/[\n,]+/);
    const normalized = [];
    items.forEach((item) => {
      const match = quickReplyDefaults.find((label) => label.toLowerCase() === String(item || '').trim().toLowerCase());
      if (!match || normalized.includes(match)) return;
      normalized.push(match);
    });
    return normalized.length ? normalized : [...quickReplyDefaults];
  };
  const readQuickReplyOrder = () => {
    try {
      return normalizeQuickReplyOrder(JSON.parse(localStorage.getItem(quickReplyOrderKey) || '[]'));
    } catch {
      return [...quickReplyDefaults];
    }

  window.addEventListener('focus', refreshRelayPanel);
  document.addEventListener('visibilitychange', () => {
    if (!document.hidden) refreshRelayPanel();
  });
  applySessionBandSide();
  applySessionWindowDefaults();
  loadInstrumentationBand();
  window.setInterval(renderInstrumentationBand, 1000);
  const openHarness = ({ force = false } = {}) => {
    if (force) harnessDisabledUntil = 0;
    if (!force && Date.now() < harnessDisabledUntil) return;
    harnessDock.classList.add('harness-dock-open');
    stage.classList.remove('spark-menu-open');
  };
  const closeBoth = () => {
    stage.classList.remove('spark-menu-open');
    harnessDock.classList.remove('harness-dock-open');
  };
  const distanceToRect = (event, rect) => {
    const cx = rect.left + rect.width / 2;
    const cy = rect.top + rect.height / 2;
    return Math.hypot(event.clientX - cx, event.clientY - cy);
  };
  const isInside = (event, rect, padX = 0, padY = 0) => (
    event.clientX >= rect.left - padX && event.clientX <= rect.right + padX &&
    event.clientY >= rect.top - padY && event.clientY <= rect.bottom + padY
  );
  const mergeRects = (rects) => {
    const usable = rects.filter((rect) => rect.width > 0 && rect.height > 0);
    if (!usable.length) return null;
    return usable.reduce((merged, rect) => ({
      left: Math.min(merged.left, rect.left),
      right: Math.max(merged.right, rect.right),
      top: Math.min(merged.top, rect.top),
      bottom: Math.max(merged.bottom, rect.bottom),
      width: Math.max(merged.right, rect.right) - Math.min(merged.left, rect.left),
      height: Math.max(merged.bottom, rect.bottom) - Math.min(merged.top, rect.top),
    }), usable[0]);
  };
  const harnessHoldRect = () => mergeRects(Array.from(harnessDock.querySelectorAll('.harness-dock-button, .harness-label, .harness-sub-label')).map((item) => item.getBoundingClientRect()));
  const chooseVisibleSystem = (event) => {
    if (Date.now() < harnessDisabledUntil) {
      harnessDock.classList.remove('harness-dock-open');
      return;
    }
    const sparkRect = spark.getBoundingClientRect();
    const menuRect = menu.getBoundingClientRect();
    const lineRect = harnessLine.getBoundingClientRect();
    const wasHarnessOpen = harnessDock.classList.contains('harness-dock-open');
    const sparkZone = {
      left: Math.min(sparkRect.left, menuRect.left),
      right: Math.max(sparkRect.right, menuRect.right),
      top: Math.min(sparkRect.top, menuRect.top),
      bottom: Math.max(sparkRect.bottom, menuRect.bottom),
      width: Math.max(sparkRect.right, menuRect.right) - Math.min(sparkRect.left, menuRect.left),
      height: Math.max(sparkRect.bottom, menuRect.bottom) - Math.min(sparkRect.top, menuRect.top),
    };
    const nearSpark = isInside(event, sparkZone, 42, 54);
    const lineHit = {
      left: lineRect.left,
      right: lineRect.right,
      top: lineRect.top + (lineRect.height / 2) - 1,
      bottom: lineRect.top + (lineRect.height / 2) + 15,
      width: lineRect.width,
      height: 16,
    };
    const lineTriggered = isInside(event, lineHit, 0, 0);
    const holdRect = wasHarnessOpen ? harnessHoldRect() : null;
    const holdingHarness = Boolean(wasHarnessOpen && holdRect && isInside(event, holdRect, 0, 0));
    const nearHarness = lineTriggered || holdingHarness;
    if (holdingHarness) {
      openHarness();
      return;
    }
    if (!nearSpark && !nearHarness) {
      closeBoth();
      return;
    }
    if (nearSpark && nearHarness) {
      const sparkDistance = distanceToRect(event, sparkRect);
      const harnessDistance = distanceToRect(event, lineRect);
      if (sparkDistance < harnessDistance) openSpark(); else openHarness();
      return;
    }
    if (nearSpark) openSpark(); else openHarness();
  };
  const clearSessionWindows = () => {
    try {
      [
        'meridian.session.transcript.prime',
        'meridian.session.prompt.prime',
        'meridian.session.rw.prompt',
        'meridian.session.rw.user-prompt',
      ].forEach((key) => localStorage.removeItem(key));
      Object.keys(localStorage)
        .filter((key) => key.startsWith('meridian.session.transcript.user.') || key.startsWith('meridian.session.prompt.user.'))
        .forEach((key) => localStorage.removeItem(key));
      return true;
    } catch {
      document.querySelectorAll('.session-prompt-input').forEach((input) => setStatus(input, 'reset storage error'));
      window.alert('Reset could not clear visible session state. The page was not reloaded.');
      return false;
    }
  };
  const clearModelStatusLabels = () => {
    document.querySelectorAll('.session-prompt-input').forEach((input) => setStatus(input, ''));
  };
  const hasResettableSessionState = () => {
    const hasPromptDraft = Array.from(document.querySelectorAll('.session-prompt-input'))
      .some((input) => input.value.trim().length > 0);
    if (hasPromptDraft) return true;
    return Object.keys(localStorage).some((key) => {
      if (!key.startsWith('meridian.session.transcript.') && !key.startsWith('meridian.session.prompt.')) return false;
      const value = localStorage.getItem(key);
      return typeof value === 'string' && value.trim().length > 2;
    });
  };
  let resetConfirmTimer = null;
  const resetButtonLabel = (button, label) => {
    if (!button) return;
    button.setAttribute('aria-label', label);
    const labelNode = button.querySelector('.spark-action-label');
    if (labelNode) labelNode.textContent = label;
  };
  const clearResetConfirmation = (button) => {
    window.clearTimeout(resetConfirmTimer);
    resetConfirmTimer = null;
    if (button) {
      button.dataset.resetConfirming = 'false';
      resetButtonLabel(button, 'Reset');
      button.removeAttribute('title');
    }
  };
  const confirmResetIfNeeded = (button) => {
    if (!hasResettableSessionState()) return true;
    if (button?.dataset.resetConfirming === 'true') {
      clearResetConfirmation(button);
      return true;
    }
    if (button) {
      button.dataset.resetConfirming = 'true';
      resetButtonLabel(button, 'Confirm Reset');
      button.title = 'Reset clears visible prompts and transcripts, then restarts the local Meridian bridge. Click again to confirm.';
      document.querySelectorAll('.session-prompt-input').forEach((input) => setStatus(input, 'confirm reset'));
      window.clearTimeout(resetConfirmTimer);
      resetConfirmTimer = window.setTimeout(() => clearResetConfirmation(button), 6000);
    }
    return false;
  };
  const hardReloadUi = ({ clearSessions = false } = {}) => {
    try {
      if (clearSessions && !clearSessionWindows()) return;
      const url = new URL(window.location.href);
      url.searchParams.set('meridian_reload', String(Date.now()));
      window.location.replace(url.toString());
    } catch {
      document.querySelectorAll('.session-prompt-input').forEach((input) => setStatus(input, 'reload error'));
      window.alert('Reload could not start. Check that Live Server is serving the Meridian root.');
    }
  };
  const waitForModelBridge = async () => {
    for (let attempt = 0; attempt < 24; attempt += 1) {
      try {
        const response = await fetch(currentBridgeUrl('models'), { cache: 'no-store' });
        const result = await response.json();
        if (result?.version === expectedBridgeVersion && result?.capabilities?.visibleTranscriptContext) return true;
      } catch {
        // Bridge may be between old and new process during reset.
      }
      await new Promise((resolve) => window.setTimeout(resolve, 250));
    }
    return false;
  };
  const restartModelBridge = async () => {
    try {
      await fetch(currentBridgeUrl('restart'), { method: 'POST', cache: 'no-store' });
      await waitForModelBridge();
    } catch {
      // Reset still reloads the UI; offline bridge status remains visible after reload.
    }
  };
  let resetInProgress = false;
  const resetUi = async (button) => {
    if (resetInProgress) return;
    if (!confirmResetIfNeeded(button)) return;
    resetInProgress = true;
    clearModelStatusLabels();
    if (!clearSessionWindows()) {
      resetInProgress = false;
      return;
    }
    await restartModelBridge();
    hardReloadUi();
  };
  let reloadInProgress = false;
  const reloadUi = () => {
    if (reloadInProgress) return;
    reloadInProgress = true;
    hardReloadUi();
  };
  const activateHarnessButton = (button, { persist = true } = {}) => {
    if (!button) return;
    const modelButton = isModelHarnessButton(button);
    screen.classList.remove('session-theme-aqua');
    screen.classList.remove('session-theme-green');
    if (userTitle) userTitle.textContent = button.dataset.sessionTitle || button.dataset.harness || 'User';
    clearRightPanelSurface();
    let rendered = false;
    if (button.dataset.harness === 'Prime') {
      rendered = renderPrimeLogic();
    } else if (button.dataset.harness === 'Bifrost') {
      rendered = renderBifrostVoiceIo();
    } else if (button.dataset.harness === 'Relay') {
      rendered = renderRelayModels();
    } else if (button.dataset.harness === 'Beacon') {
      rendered = renderBeaconLiveness();
    } else if (button.dataset.harness === 'Codex Reviews') {
      rendered = renderReviewConsole();
    } else if (button.dataset.harness === 'Federation') {
      rendered = renderFederationHorizon();
    } else if (button.dataset.harness === 'Compass') {
      rendered = renderCompassProjectLogic();
    } else if (button.dataset.harness === 'Session Lifecycle') {
      rendered = renderVulcanSessionLogic();
    } else if (button.dataset.harness === 'Workflow') {
      rendered = renderWorkflowDispatchStatus();
    } else if (button.dataset.harness === 'Echo') {
      rendered = renderEchoMemory();
    } else if (button.dataset.harness === 'Atlas') {
      rendered = renderAtlasRetrieval();
    } else if (button.dataset.harness === 'FileMap') {
      rendered = renderFileMap();
    } else if (button.dataset.harness === 'Aegis') {
      rendered = renderAegisLogic();
    } else if (button.dataset.harness === 'Release') {
      rendered = renderReleaseAutonomy();
    } else {
      rendered = modelButton ? renderModelHarnessSurface(button) : renderHarnessSurface(button);
    }
    if (!rendered) return;
    if (modelButton) {
      setHarnessDockMode('model');
      setSelectedModelHarnessButton(button, { persist });
      screen.classList.add('session-theme-green');
      loadModelHarnessBackendBinding();
    }
    screen.classList.add('sessions-visible');
    setRightPanelAuthority('harness', button.dataset.harness || 'Harness', { persist });
    harnessDisabledUntil = Date.now() + 2000;
    harnessDock.classList.remove('harness-dock-open');
  };
  const activateSparkButton = (button, { persist = true } = {}) => {
    if (!button) return;
    const actionLabel = button.getAttribute('aria-label') || '';
    buttons.forEach((item) => item.classList.remove('is-selected'));
    button.classList.add('is-selected');
    screen.classList.remove('session-theme-aqua');
    screen.classList.add('session-theme-green');
    if (userTitle) userTitle.textContent = actionLabel || 'Spark';
    const rendered = actionLabel === 'Balance'
      ? renderProviderBalance()
      : (actionLabel === 'Models'
        ? renderSparkModels()
        : (actionLabel === 'Crosscheck'
          ? renderSparkCrosscheck()
          : (actionLabel === 'Backlog'
            ? renderSparkBacklog()
            : (actionLabel === 'Skills'
              ? renderSparkSkills()
          : (actionLabel === 'Routines'
            ? renderGoalRuntime()
            : (actionLabel === 'Archive' ? renderSessionCloseArchiveProof() : renderSparkSurface(actionLabel || 'Spark')))))));
    if (!rendered) return;
    screen.classList.add('sessions-visible');
    setRightPanelAuthority('spark', actionLabel || 'Spark', { persist });
    openSpark();
  };
  const navigateSparkButton = (button, delta) => {
    const current = buttons.indexOf(button);
    if (current < 0 || !buttons.length) return;
    const next = buttons[(current + delta + buttons.length) % buttons.length];
    next.focus({ preventScroll: true });
    openSpark();
  };
  const focusSparkButtonAt = (index) => {
    const next = buttons[index] || null;
    if (!next) return;
    next.focus({ preventScroll: true });
    openSpark();
  };
  const sparkButtonByLabel = (label) => buttons.find((button) => button.getAttribute('aria-label') === label);
  const harnessButtonByName = (name) => Array.from(document.querySelectorAll('.harness-dock-button'))
    .find((button) => button.dataset.harness === name);
  rightWorkspace?.addEventListener('click', (event) => {
    const handoff = event.target.closest?.('[data-balance-handoff]');
    const crosscheckHandoff = event.target.closest?.('[data-crosscheck-handoff]');
    const archiveHandoff = event.target.closest?.('[data-archive-handoff]');
    const targetButton = handoff
      ? sparkButtonByLabel(handoff.dataset.balanceHandoff === 'models' ? 'Models' : 'Settings')
      : archiveHandoff
        ? sparkButtonByLabel(archiveHandoff.dataset.archiveHandoff === 'echo' ? 'Echo' : 'Atlas')
      : (crosscheckHandoff?.dataset.crosscheckHandoff === 'archive'
        ? sparkButtonByLabel('Archive')
        : (crosscheckHandoff?.dataset.crosscheckHandoff === 'aegis'
          ? harnessButtonByName('Aegis')
          : null));
    if (!targetButton) return;
    event.preventDefault();
    if (targetButton.classList.contains('harness-dock-button')) activateHarnessButton(targetButton);
    else activateSparkButton(targetButton);
  });
  rightWorkspace?.addEventListener('input', (event) => {
    const target = event.target;
    if (!target?.matches?.('[data-backlog-search]')) return;
    const reviewNode = rightWorkspace.querySelector('[data-backlog-review-console]');
    if (!reviewNode?.dataset.backlogReviewSnapshot) return;
    try {
      const snapshot = JSON.parse(reviewNode.dataset.backlogReviewSnapshot);
      snapshot._ui_query = target.value || '';
      const nextState = writeBacklogFilterState({
        query: snapshot._ui_query,
        state: snapshot._ui_state || 'all',
        severity: snapshot._ui_severity || 'all',
        response: snapshot._ui_response || 'all',
        owner: snapshot._ui_owner || 'all',
        blocked: snapshot._ui_blocked || 'all',
      });
      reviewNode.dataset.backlogUiState = JSON.stringify(nextState);
      reviewNode.innerHTML = renderBacklogReviewSnapshot(snapshot);
      reviewNode.querySelector('[data-backlog-search]')?.focus({ preventScroll: true });
    } catch {}
  });
  rightWorkspace?.addEventListener('change', (event) => {
    const target = event.target;
    if (!target?.matches?.('[data-backlog-state-filter], [data-backlog-severity-filter], [data-backlog-response-filter], [data-backlog-owner-filter], [data-backlog-blocked-filter]')) return;
    const reviewNode = rightWorkspace.querySelector('[data-backlog-review-console]');
    if (!reviewNode?.dataset.backlogReviewSnapshot) return;
    try {
      const snapshot = JSON.parse(reviewNode.dataset.backlogReviewSnapshot);
      const search = reviewNode.querySelector('[data-backlog-search]')?.value || snapshot._ui_query || '';
      snapshot._ui_query = search;
      snapshot._ui_state = reviewNode.querySelector('[data-backlog-state-filter]')?.value || 'all';
      snapshot._ui_severity = reviewNode.querySelector('[data-backlog-severity-filter]')?.value || 'all';
      snapshot._ui_response = reviewNode.querySelector('[data-backlog-response-filter]')?.value || 'all';
      snapshot._ui_owner = reviewNode.querySelector('[data-backlog-owner-filter]')?.value || 'all';
      snapshot._ui_blocked = reviewNode.querySelector('[data-backlog-blocked-filter]')?.value || 'all';
      const nextState = writeBacklogFilterState({
        query: snapshot._ui_query,
        state: snapshot._ui_state,
        severity: snapshot._ui_severity,
        response: snapshot._ui_response,
        owner: snapshot._ui_owner,
        blocked: snapshot._ui_blocked,
      });
      reviewNode.dataset.backlogUiState = JSON.stringify(nextState);
      reviewNode.innerHTML = renderBacklogReviewSnapshot(snapshot);
    } catch {}
  });
  rightWorkspace?.addEventListener('input', (event) => {
    const target = event.target;
    if (!target?.matches?.('[data-review-console-search]')) return;
    const logicNode = rightWorkspace.querySelector('[data-review-console]');
    if (!logicNode?.dataset.reviewConsoleSnapshot) return;
    try {
      const snapshot = JSON.parse(logicNode.dataset.reviewConsoleSnapshot);
      snapshot._ui_query = target.value || '';
      logicNode.dataset.reviewConsoleUiState = JSON.stringify({
        query: snapshot._ui_query,
        severity: snapshot._ui_severity || 'all',
        owner: snapshot._ui_owner || 'all',
      });
      logicNode.innerHTML = renderReviewConsoleSnapshot(snapshot);
      logicNode.querySelector('[data-review-console-search]')?.focus({ preventScroll: true });
    } catch {}
  });
  rightWorkspace?.addEventListener('change', (event) => {
    const target = event.target;
    if (!target?.matches?.('[data-review-console-severity-filter], [data-review-console-owner-filter]')) return;
    const logicNode = rightWorkspace.querySelector('[data-review-console]');
    if (!logicNode?.dataset.reviewConsoleSnapshot) return;
    try {
      const snapshot = JSON.parse(logicNode.dataset.reviewConsoleSnapshot);
      snapshot._ui_query = logicNode.querySelector('[data-review-console-search]')?.value || snapshot._ui_query || '';
      snapshot._ui_severity = logicNode.querySelector('[data-review-console-severity-filter]')?.value || 'all';
      snapshot._ui_owner = logicNode.querySelector('[data-review-console-owner-filter]')?.value || 'all';
      logicNode.dataset.reviewConsoleUiState = JSON.stringify({
        query: snapshot._ui_query,
        severity: snapshot._ui_severity,
        owner: snapshot._ui_owner,
      });
      logicNode.innerHTML = renderReviewConsoleSnapshot(snapshot);
    } catch {}
  });
  buttons.forEach((button) => {
    button.addEventListener('click', async () => {
      const actionLabel = button.getAttribute('aria-label') || '';
      if (actionLabel === 'Reset' || actionLabel === 'Confirm Reset') {
        await resetUi(button);
        return;
      }
      if (actionLabel === 'Reload') {
        reloadUi();
        return;
      }
      if (actionLabel === 'Close') {
        buttons.forEach((item) => item.classList.remove('is-selected'));
        restoreUserPanel({ warning: 'surface closed only; open Archive for reviewed session close proof' });
        refreshCloseBoundaryWarning();
        openSpark();
        return;
      }
      activateSparkButton(button);
    });
    button.addEventListener('keydown', (event) => {
      if (event.key === 'ArrowRight' || event.key === 'ArrowDown') {
        event.preventDefault();
        navigateSparkButton(button, 1);
      } else if (event.key === 'ArrowLeft' || event.key === 'ArrowUp') {
        event.preventDefault();
        navigateSparkButton(button, -1);
      } else if (event.key === 'Home') {
        event.preventDefault();
        focusSparkButtonAt(0);
      } else if (event.key === 'End') {
        event.preventDefault();
        focusSparkButtonAt(buttons.length - 1);
      }
    });
  });
  mockupButtons.forEach((button, index) => {
    button.addEventListener('click', (event) => {
      event.preventDefault();
      event.stopPropagation();
      mockupButtons.forEach((item) => item.classList.remove('is-selected'));
      button.classList.add('is-selected');
      spark.classList.remove(
        'spark-design-1',
        'spark-design-2',
        'spark-design-3',
        'spark-design-4',
        'spark-design-5',
        'spark-design-6',
        'spark-design-7',
        'spark-design-8',
        'spark-design-9',
        'spark-design-10'
      );
      spark.classList.add(`spark-design-${index + 1}`);
    });
  });
  spark.addEventListener('pointerenter', openSpark);
  sparkToggle.addEventListener('pointerenter', openSpark);
  sparkToggle.addEventListener('click', () => {
    const panelsVisible = screen.classList.contains('sessions-visible');
    const harnessPanelActive = panelsVisible && !screen.classList.contains('session-theme-aqua');
    restoreUserPanel();
    if (!harnessPanelActive) screen.classList.toggle('sessions-visible');
    openSpark();
  });
  harnessDock.addEventListener('click', (event) => {
    if (event.target.closest?.('.harness-dock-button')) return;
    const hitButton = harnessButtons.find((button) => {
      const rect = button.getBoundingClientRect();
      return rect.width > 0 && rect.height > 0 && isInside(event, rect, 0, 0);
    });
    activateHarnessButton(hitButton);
  });
  harnessButtons.forEach((button) => {
    button.addEventListener('click', () => activateHarnessButton(button));
    button.addEventListener('keydown', (event) => {
      if (!isModelHarnessButton(button)) return;
      if (event.key === 'ArrowRight' || event.key === 'ArrowDown') {
        event.preventDefault();
        navigateModelHarnessAspect(button, 1);
      } else if (event.key === 'ArrowLeft' || event.key === 'ArrowUp') {
        event.preventDefault();
        navigateModelHarnessAspect(button, -1);
      } else if (event.key === 'Home') {
        event.preventDefault();
        activateModelHarnessAspectAt(0);
      } else if (event.key === 'End') {
        event.preventDefault();
        activateModelHarnessAspectAt(modelHarnessButtons().length - 1);
      }
    });
  });
  const restoreStoredRightPanel = () => {
    if (readWakeMode() === 'silent wake') {
      restoreUserPanel({ persist: false });
      return;
    }
    const stored = readStoredRightPanel();
    if (stored.mode === 'harness') {
      const button = harnessButtons.find((item) => item.dataset.harness === stored.selection);
      if (button) activateHarnessButton(button, { persist: false });
      else restoreUserPanel({ warning: 'surface unavailable; User Session restored' });
      return;
    }
    if (stored.mode === 'spark') {
      const button = buttons.find((item) => item.getAttribute('aria-label') === stored.selection);
      if (button && stored.selection !== 'Reset' && stored.selection !== 'Reload') activateSparkButton(button, { persist: false });
      else restoreUserPanel({ warning: 'surface unavailable; User Session restored' });
      return;
    }
    if (stored.warning) restoreUserPanel({ warning: stored.warning });
    else restoreUserPanel({ persist: false });
  };
  restoreStoredRightPanel();
  if (readWakeMode() === 'full wake') {
    const input = document.querySelector('.session-window-left .session-prompt-input');
    if (input && typeof pushEntry === 'function') {
      const startupKind = window.meridianReloadMarkerPresent ? 'reload' : 'startup';
      pushEntry(
        input,
        'setup',
        startupKind === 'reload'
          ? 'Wake complete: full wake restored the last visible panel.'
          : 'Wake complete: full wake restored the session interface.',
        'Wake',
        { wakeMode: 'full wake', startupKind, audioStack: 'inactive', panelRestore: 'enabled' }
      );
    }
  }
  menu.addEventListener('pointerenter', openSpark);
  document.addEventListener('pointermove', chooseVisibleSystem);
})();
</script>
