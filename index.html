<!DOCTYPE html>
<html lang="en"><head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Bifrost Cockpit - Meridian</title>
<style>
*, *::before, *::after { box-sizing: border-box; }

html,
body {
  width: 100%;
  min-height: 100%;
}

body {
  margin: 0;
  min-height: 100vh;
  overflow: hidden;
  background: #000;
  color: #dffbff;
  font-family: "Cascadia Code", "JetBrains Mono", monospace;
}

.harness-screen {
  --harness-width: min(1120px, calc(100vw - 48px));
  --harness-left: calc(24px + ((100vw - 48px - var(--harness-width)) / 2));
  min-height: 100vh;
  display: grid;
  align-items: end;
  position: relative;
  padding: 24px 24px 34px;
  background:
    radial-gradient(circle at 50% 88%, rgba(35, 220, 255, 0.09), transparent 34rem),
    #000;
}

.brand-lockup {
  position: absolute;
  left: max(18px, calc(var(--harness-left) - 180px));
  top: 28px;
  z-index: 3;
  width: min(430px, calc(100vw - 36px));
  isolation: isolate;
}

.brand-primary {
  display: block;
}

.brand-copy {
  min-width: 0;
  text-align: center;
}

.brand-name {
  font-family: "Segoe UI", "Inter", system-ui, sans-serif;
  font-size: clamp(37px, 4.8vw, 54px);
  font-weight: 800;
  line-height: 0.9;
  letter-spacing: 0;
  color: var(--cyan);
  background: linear-gradient(90deg, #41d9ff 0%, #64f6ff 28%, #5d9dff 52%, #38e9ff 76%, #41d9ff 100%);
  background-size: 240% 100%;
  background-clip: text;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  text-shadow: 0 0 18px rgba(65, 217, 255, 0.24);
  animation: brand-name-aqua-flow 28s ease-in-out infinite;
}

.brand-tagline {
  margin-top: 4px;
  font-family: "Cascadia Code", "JetBrains Mono", monospace;
  font-size: clamp(14px, 1.68vw, 22px);
  line-height: 1.1;
  letter-spacing: 0.04em;
  white-space: nowrap;
  background: linear-gradient(90deg, #41d9ff 0%, #64f6ff 28%, #5d9dff 52%, #38e9ff 76%, #41d9ff 100%);
  background-size: 240% 100%;
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
  animation: brand-tagline-color-flow 28s ease-in-out infinite;
}

.speech-mode-button {
  position: absolute;
  right: 28px;
  top: 28px;
  z-index: 4;
  width: 46px;
  height: 46px;
  display: grid;
  place-items: center;
  border: 1px solid rgba(255, 84, 84, 0.62);
  background:
    linear-gradient(135deg, rgba(255, 84, 84, 0.1), rgba(20, 4, 8, 0.22)),
    radial-gradient(circle at 50% 50%, rgba(255, 84, 84, 0.1), transparent 60%);
  clip-path: polygon(50% 0, 100% 50%, 50% 100%, 0 50%);
  color: #dffbff;
  padding: 8px;
  cursor: pointer;
  outline: none;
  box-shadow:
    0 0 12px rgba(255, 84, 84, 0.24),
    inset 0 0 12px rgba(255, 84, 84, 0.08);
  transition: border-color 140ms ease, background 140ms ease, box-shadow 140ms ease;
}

.speech-mode-button::after {
  content: "";
  position: absolute;
  right: 4px;
  top: 4px;
  width: 7px;
  height: 7px;
  background: #ff5454;
  box-shadow: 0 0 8px rgba(255, 84, 84, 0.9);
  clip-path: polygon(50% 0, 100% 50%, 50% 100%, 0 50%);
}

.speech-mode-button svg {
  width: 100%;
  height: 100%;
  fill: none;
  stroke: rgba(255, 112, 112, 0.95);
  stroke-width: 2.2;
  stroke-linecap: round;
  stroke-linejoin: round;
  filter: drop-shadow(0 0 7px rgba(255, 84, 84, 0.54));
  transition: filter 140ms ease, stroke 140ms ease, transform 140ms ease;
}

.speech-mode-button[aria-pressed="true"] {
  border-color: rgba(79, 255, 147, 0.68);
  background:
    linear-gradient(135deg, rgba(79, 255, 147, 0.12), rgba(3, 20, 12, 0.24)),
    radial-gradient(circle at 50% 50%, rgba(79, 255, 147, 0.12), transparent 60%);
  box-shadow:
    0 0 14px rgba(79, 255, 147, 0.3),
    inset 0 0 12px rgba(79, 255, 147, 0.08);
}

.speech-mode-button[aria-pressed="true"]::after {
  background: #4fff93;
  box-shadow: 0 0 9px rgba(79, 255, 147, 0.95);
}

.speech-mode-button[aria-pressed="true"] svg {
  stroke: rgba(157, 255, 194, 0.96);
  filter: drop-shadow(0 0 8px rgba(79, 255, 147, 0.62));
}

.speech-mode-button:hover,
.speech-mode-button:focus-visible {
  border-color: rgba(223, 251, 255, 0.72);
}

.speech-mode-button:hover svg,
.speech-mode-button:focus-visible svg {
  stroke: #dffbff;
  transform: scale(1.08);
  filter: drop-shadow(0 0 12px currentColor);
}

.date-orb {
  position: absolute;
  left: 50%;
  top: 22px;
  z-index: 8;
  width: 118px;
  height: 118px;
  transform: translateX(-50%);
  color: #dffbff;
  border-radius: 50%;
  background: radial-gradient(circle, #000 0 64%, rgba(0, 0, 0, 0.96) 65% 100%);
  filter:
    drop-shadow(0 0 10px rgba(87, 239, 255, 0.34))
    drop-shadow(0 0 24px rgba(87, 239, 255, 0.14));
  pointer-events: none;
  isolation: isolate;
}

.date-orb::before {
  content: "";
  position: absolute;
  inset: -9px;
  border-radius: 50%;
  background: conic-gradient(
    from 0deg,
    #ff3d7f,
    #ffb000,
    #fff45c,
    #56ff8a,
    #39f7ff,
    #5d9dff,
    #b264ff,
    #ff3d7f
  );
  opacity: 0;
  transform: scale(0.78);
  filter: blur(1px) drop-shadow(0 0 14px rgba(87, 239, 255, 0.4));
  mask: radial-gradient(circle, transparent 57%, #000 59% 65%, transparent 68%);
  pointer-events: none;
}

.date-orb-svg {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  overflow: visible;
}

.date-orb-outer,
.date-orb-inner,
.date-orb-tick-ring,
.date-orb-hour-fill,
.date-orb-slick-track {
  fill: none;
  stroke-linecap: round;
}

.date-orb-outer {
  stroke: rgba(87, 239, 255, 0.8);
  stroke-width: 2;
}

.date-orb-inner {
  stroke: rgba(87, 239, 255, 0.42);
  stroke-width: 1.5;
}

.date-orb-tick-ring {
  stroke: rgba(87, 239, 255, 0.22);
  stroke-width: 7;
  stroke-dasharray: 1 8;
}

.date-orb-slick-track {
  stroke: rgba(87, 239, 255, 0.13);
  stroke-width: 10;
  stroke-dasharray: 18 82;
  transform: rotate(-90deg);
  transform-origin: 60px 60px;
}

.date-orb-hour-fill {
  stroke: rgba(57, 247, 255, 0.68);
  stroke-width: 7;
  stroke-dasharray: var(--date-hour-progress, 0 100);
  stroke-dashoffset: 0;
  transform: rotate(-90deg);
  transform-origin: 60px 60px;
  filter:
    drop-shadow(0 0 6px rgba(87, 239, 255, 0.7))
    drop-shadow(0 0 12px rgba(87, 239, 255, 0.28));
  transition: stroke-dasharray 420ms linear;
}

.date-orb.is-countdown {
  animation: date-orb-countdown-pulse var(--date-pulse-duration, 1400ms) ease-in-out infinite;
}

.date-orb.is-countdown .date-orb-outer,
.date-orb.is-countdown .date-orb-inner,
.date-orb.is-countdown .date-orb-tick-ring,
.date-orb.is-countdown .date-orb-hour-fill,
.date-orb.is-countdown .date-orb-cut,
.date-orb.is-countdown .date-orb-hour,
.date-orb.is-countdown .date-orb-copy {
  animation: date-orb-color-pressure var(--date-pulse-duration, 1400ms) ease-in-out infinite;
}

.date-orb.is-hour-burst::before {
  animation: date-orb-rainbow-burst 1.8s ease-out;
}

.date-orb-cut {
  fill: none;
  stroke: rgba(223, 251, 255, 0.72);
  stroke-width: 2;
  stroke-linecap: round;
  filter: drop-shadow(0 0 5px rgba(87, 239, 255, 0.56));
}

.date-orb-hour {
  fill: #dffbff;
  stroke: rgba(87, 239, 255, 0.54);
  stroke-width: 0.8;
  paint-order: stroke fill;
  font-family: "Segoe UI", "Inter", system-ui, sans-serif;
  font-size: calc(22px * var(--date-hour-scale, 1));
  font-weight: 900;
  text-anchor: middle;
  dominant-baseline: middle;
  filter:
    drop-shadow(0 0 7px rgba(87, 239, 255, 0.86))
    drop-shadow(0 0 12px rgba(87, 239, 255, 0.38));
  transition: font-size 220ms ease;
}

.date-orb.is-q1 .date-orb-cut-2,
.date-orb.is-q2 .date-orb-cut-3,
.date-orb.is-q3 .date-orb-cut-4 {
  stroke: #39f7ff;
  stroke-width: 3;
  filter:
    drop-shadow(0 0 7px rgba(87, 239, 255, 0.9))
    drop-shadow(0 0 12px rgba(87, 239, 255, 0.44));
}

.date-orb-copy {
  position: absolute;
  inset: 0;
  display: grid;
  place-content: center;
  text-align: center;
  text-transform: uppercase;
  text-shadow: 0 0 9px rgba(87, 239, 255, 0.78);
}

.date-orb-month {
  font-size: 9px;
  line-height: 1;
  letter-spacing: 0.16em;
  color: rgba(185, 251, 255, 0.82);
}

.date-orb-day {
  margin-top: 4px;
  color: #dffbff;
  font-family: "Segoe UI", "Inter", system-ui, sans-serif;
  font-size: 31px;
  font-weight: 800;
  line-height: 0.9;
  letter-spacing: 0;
}

.spark-stage {
  position: absolute;
  left: 50%;
  top: 50%;
  width: min(468px, 62.4vw);
  transform: translate(-50%, -54%);
  z-index: 2;
}

.spark-stage::after {
  content: "";
  position: absolute;
  left: -116px;
  right: -116px;
  top: -116px;
  bottom: -116px;
  z-index: 0;
  pointer-events: none;
}

.spark-icon-strikes {
  position: absolute;
  inset: 0;
  z-index: 6;
  overflow: visible;
  pointer-events: none;
  opacity: 0;
  mix-blend-mode: screen;
  transition: opacity 120ms ease;
}

.spark-stage.spark-menu-open .spark-icon-strikes,
.spark-stage:focus-within .spark-icon-strikes {
  opacity: 1;
}

.spark-icon-bolt-main,
.spark-icon-bolt-fork {
  fill: none;
  stroke-linecap: round;
  stroke-linejoin: round;
  vector-effect: non-scaling-stroke;
}

.spark-icon-bolt-main {
  stroke: var(--bolt-color, #57efff);
  stroke-width: 1.7;
  filter: drop-shadow(0 0 4px var(--bolt-color, #57efff)) drop-shadow(0 0 12px rgba(87, 239, 255, 0.62));
  animation: spark-icon-bolt-main 260ms ease-out forwards;
}

.spark-icon-bolt-fork {
  stroke: var(--bolt-fork-color, #dffbff);
  stroke-width: 0.95;
  opacity: 0.82;
  filter: drop-shadow(0 0 7px rgba(223, 251, 255, 0.58));
  animation: spark-icon-bolt-fork 210ms ease-out forwards;
}

@keyframes spark-icon-bolt-main {
  0% { opacity: 0; stroke-dasharray: 0 420; }
  14% { opacity: 1; stroke-dasharray: 180 420; }
  54% { opacity: 0.86; stroke-dasharray: 420 420; }
  100% { opacity: 0; stroke-dasharray: 420 420; }
}

@keyframes spark-icon-bolt-fork {
  0% { opacity: 0; stroke-dasharray: 0 90; }
  26% { opacity: 0.86; stroke-dasharray: 70 90; }
  100% { opacity: 0; stroke-dasharray: 90 90; }
}
.spark-restart-core {
  position: relative;
  z-index: 1;
  display: block;
  width: 100%;
  aspect-ratio: 1;
  border-radius: 50%;
  overflow: hidden;
  isolation: isolate;
  background:
    radial-gradient(circle at 50% 50%, transparent 0 30%, rgba(0, 0, 0, 0.08) 48%, rgba(0, 0, 0, 0.95) 78%),
    url("bifrost/static/media/spark-hud-reference.jpg") center / 139% auto no-repeat;
  box-shadow:
    0 0 0 1px rgba(185, 251, 255, 0.18),
    0 0 28px rgba(87, 239, 255, 0.32),
    0 0 62px rgba(87, 239, 255, 0.14),
    inset 0 0 46px rgba(0, 0, 0, 0.88);
  animation: restart-image-breathe 8.6s ease-in-out infinite, core-drift 13s ease-in-out infinite;
  opacity: 1;
  filter: brightness(0.94) saturate(1.12) contrast(1.05);
  transform-origin: 50% 52%;
  pointer-events: auto;
}

.spark-restart-core::before,
.spark-restart-core::after,
.spark-restart-core .restart-inner-void,
.spark-restart-core .restart-inward-flow,
.spark-restart-core .restart-scan-ring {
  content: "";
  position: absolute;
  left: 50%;
  top: 50%;
  border-radius: 50%;
  transform: translate(-50%, -50%);
  pointer-events: none;
}

.spark-restart-core::before,
.spark-restart-core::after,
.spark-restart-core .restart-inner-void,
.spark-restart-core .restart-inward-flow,
.spark-restart-core .restart-scan-ring {
  display: block;
}

.spark-restart-core::before {
  z-index: 2;
  width: 94%;
  aspect-ratio: 1;
  background:
    repeating-conic-gradient(from -4deg, transparent 0deg 8deg, rgba(223, 251, 255, 0.32) 8deg 8.8deg, rgba(87, 239, 255, 0.24) 8.8deg 10.4deg, transparent 10.4deg 17deg),
    radial-gradient(circle, transparent 0 45%, rgba(87, 239, 255, 0.18) 46% 48%, transparent 49% 100%);
  mask: radial-gradient(circle, transparent 0 24%, rgba(0, 0, 0, 0.45) 25% 52%, #000 53% 88%, transparent 89%);
  filter: drop-shadow(0 0 9px rgba(87, 239, 255, 0.46));
  animation: restart-inward-clean 5.8s ease-in-out infinite, restart-ring-spin 54s linear infinite;
}

.spark-restart-core::after {
  z-index: 5;
  width: 27%;
  aspect-ratio: 1;
  background:
    radial-gradient(circle, #000 0 58%, rgba(1, 10, 14, 0.98) 59% 76%, rgba(0, 0, 0, 0.9) 77% 100%);
  box-shadow:
    0 0 0 7px rgba(0, 0, 0, 0.86),
    0 0 20px rgba(87, 239, 255, 0.18),
    inset 0 0 16px #000;
  animation: restart-center-strip-breathe 8.2s ease-in-out infinite;
}

.spark-restart-core .restart-inward-flow,
.spark-restart-core .restart-scan-ring,
.spark-restart-core .restart-inner-void {
  display: none;
}

.spark-restart-core::before {
  z-index: 1;
  width: 82%;
  aspect-ratio: 1;
  background:
    repeating-conic-gradient(from 0deg, rgba(223, 251, 255, 0.72) 0deg 1deg, rgba(87, 239, 255, 0.38) 1deg 1.8deg, transparent 1.8deg 5.6deg),
    radial-gradient(circle, transparent 0 69%, rgba(87, 239, 255, 0.32) 70% 73%, transparent 74%);
  mask: radial-gradient(circle, transparent 0 58%, #000 59% 86%, transparent 87%);
  filter:
    drop-shadow(0 0 8px rgba(87, 239, 255, 0.82))
    drop-shadow(0 0 18px rgba(93, 157, 255, 0.28));
  animation: restart-ring-spin 34s linear infinite, restart-ring-breathe 6.4s ease-in-out infinite;
}

.spark-restart-core::after {
  z-index: 2;
  width: 70%;
  aspect-ratio: 1;
  background:
    repeating-conic-gradient(from 8deg, rgba(87, 239, 255, 0.88) 0deg 4deg, rgba(223, 251, 255, 0.70) 4deg 6deg, transparent 6deg 10deg);
  mask: radial-gradient(circle, transparent 0 74%, #000 75% 83%, transparent 84%);
  filter: drop-shadow(0 0 11px rgba(87, 239, 255, 0.76));
  animation: restart-ring-spin-reverse 24s linear infinite, restart-ring-breathe 5.6s ease-in-out infinite;
}

.spark-restart-core .restart-inward-flow {
  z-index: 3;
  width: 78%;
  aspect-ratio: 1;
  background:
    repeating-conic-gradient(from -2deg, transparent 0deg 9deg, rgba(223, 251, 255, 0.46) 9deg 10deg, rgba(87, 239, 255, 0.34) 10deg 11.4deg, transparent 11.4deg 18deg);
  mask: radial-gradient(circle, transparent 0 20%, rgba(0, 0, 0, 0.28) 21% 45%, #000 46% 78%, transparent 79%);
  filter: drop-shadow(0 0 9px rgba(87, 239, 255, 0.46));
  animation: restart-inward-pulse 4.8s ease-in-out infinite, restart-ring-spin 42s linear infinite;
}

.spark-restart-core .restart-scan-ring {
  z-index: 4;
  width: 53%;
  aspect-ratio: 1;
  border: 1px solid rgba(185, 251, 255, 0.34);
  background:
    conic-gradient(from 0deg, transparent 0 54deg, rgba(185, 251, 255, 0.22) 54deg 61deg, transparent 61deg 180deg, rgba(87, 239, 255, 0.18) 180deg 188deg, transparent 188deg);
  box-shadow:
    inset 0 0 18px rgba(0, 0, 0, 0.8),
    0 0 14px rgba(87, 239, 255, 0.28);
  animation: restart-ring-spin-reverse 18s linear infinite;
}

.spark-restart-core .restart-inner-void {
  z-index: 6;
  width: 24%;
  aspect-ratio: 1;
  background:
    radial-gradient(circle, rgba(0, 0, 0, 1) 0 54%, rgba(1, 10, 14, 0.98) 55% 76%, rgba(0, 0, 0, 0.92) 77% 100%);
  box-shadow:
    0 0 0 5px rgba(0, 0, 0, 0.82),
    0 0 18px rgba(87, 239, 255, 0.22),
    inset 0 0 14px #000;
  animation: restart-void-breathe 7.2s ease-in-out infinite;
}

.core-animation {
  position: relative;
  z-index: 1;
  display: block;
  width: 100%;
  aspect-ratio: 1;
  border-radius: 50%;
  overflow: hidden;
  isolation: isolate;
  background:
    radial-gradient(circle at 50% 50%, rgba(8, 24, 30, 0.96) 0 25%, rgba(3, 10, 14, 0.98) 26% 42%, rgba(0, 0, 0, 1) 43% 100%);
  box-shadow:
    0 0 0 1px rgba(185, 251, 255, 0.22),
    0 0 18px rgba(87, 239, 255, 0.34),
    0 0 48px rgba(87, 239, 255, 0.15),
    inset 0 0 38px rgba(0, 0, 0, 0.94);
  animation: core-drift 11s ease-in-out infinite, spark-base-alive 8.4s ease-in-out infinite;
  transform-origin: 50% 52%;
  pointer-events: auto;
}

.core-animation::before {
  content: "";
  position: absolute;
  inset: 3.5%;
  border-radius: 50%;
  background:
    linear-gradient(112deg, transparent 0 43%, rgba(185, 251, 255, 0.15) 44% 45%, transparent 46% 100%),
    linear-gradient(22deg, transparent 0 54%, rgba(87, 239, 255, 0.12) 55% 56%, transparent 57% 100%);
  opacity: 0.72;
  filter: drop-shadow(0 0 7px rgba(87, 239, 255, 0.26));
  animation: spark-glass-sweep 17s ease-in-out infinite;
}
.core-animation::after {
  content: "";
  position: absolute;
  left: 50%;
  top: 50%;
  z-index: 2;
  width: var(--spark-splash-size, 86%);
  aspect-ratio: 1;
  border-radius: 50%;
  transform: translate(-50%, -50%);
  background:
    repeating-conic-gradient(from var(--spark-splash-angle, -2deg), rgba(223, 251, 255, 0.88) 0deg var(--spark-splash-width, 0.8deg), rgba(87, 239, 255, 0.54) var(--spark-splash-width, 0.8deg) calc(var(--spark-splash-width, 0.8deg) + 0.9deg), transparent calc(var(--spark-splash-width, 0.8deg) + 0.9deg) var(--spark-splash-gap, 9deg)),
    radial-gradient(circle, transparent 0 61%, rgba(87, 239, 255, 0.24) 62% 64%, transparent 65% 100%);
  mask: radial-gradient(circle, transparent 0 var(--spark-splash-hole, 66%), #000 calc(var(--spark-splash-hole, 66%) + 1%) var(--spark-splash-reach, 94%), transparent calc(var(--spark-splash-reach, 94%) + 1%) 100%);
  filter:
    drop-shadow(0 0 6px rgba(223, 251, 255, 0.82))
    drop-shadow(0 0 18px rgba(87, 239, 255, 0.44));
  opacity: var(--spark-splash-opacity, 0.82);
  animation: spark-data-splash var(--spark-splash-pulse, 6.4s) ease-in-out infinite, spark-base-spin var(--spark-splash-spin, 54s) linear infinite;
  pointer-events: none;
}

.spark-base-ring,
.spark-base-plus-one,
.spark-plus-ring,
.spark-plus-lens {
  position: absolute;
  left: 50%;
  top: 50%;
  border-radius: 50%;
  transform: translate(-50%, -50%);
  pointer-events: none;
}

.spark-base-ring-outer {
  width: 97%;
  aspect-ratio: 1;
  border: 1px solid rgba(185, 251, 255, 0.35);
  background:
    repeating-conic-gradient(from 2deg, rgba(223, 251, 255, 0.40) 0deg 1deg, transparent 1deg 14deg),
    conic-gradient(from 0deg, transparent 0deg 14deg, rgba(87, 239, 255, 0.16) 14deg 18deg, transparent 18deg 42deg, rgba(93, 157, 255, 0.15) 42deg 46deg, transparent 46deg 360deg);
  mask: radial-gradient(circle, transparent 0 64%, #000 65% 82%, transparent 83% 100%);
  filter: drop-shadow(0 0 9px rgba(87, 239, 255, 0.38));
  animation: spark-base-spin 62s linear infinite;
}

.spark-base-ring-panels {
  width: 86%;
  aspect-ratio: 1;
  background:
    repeating-conic-gradient(from -4deg, rgba(223, 251, 255, 0.25) 0deg 8deg, rgba(10, 24, 29, 0.72) 8deg 12deg, transparent 12deg 20deg),
    radial-gradient(circle, transparent 0 63%, rgba(87, 239, 255, 0.18) 64% 66%, transparent 67% 100%);
  mask: radial-gradient(circle, transparent 0 68%, #000 69% 82%, transparent 83% 100%);
  animation: spark-base-spin-reverse 48s linear infinite;
}

.spark-base-ring-spectrum {
  width: 74%;
  aspect-ratio: 1;
  background:
    repeating-conic-gradient(from 0deg, rgba(223, 251, 255, 0.84) 0deg 0.7deg, rgba(87, 239, 255, 0.42) 0.7deg 1.5deg, transparent 1.5deg 3.6deg),
    radial-gradient(circle, transparent 0 77%, rgba(87, 239, 255, 0.35) 78% 80%, transparent 81%);
  mask: radial-gradient(circle, transparent 0 56%, #000 57% 79%, transparent 80%);
  filter:
    drop-shadow(0 0 7px rgba(87, 239, 255, 0.9))
    drop-shadow(0 0 18px rgba(87, 239, 255, 0.36));
  animation: spark-spectrum-pulse 5.8s ease-in-out infinite, spark-base-spin 29s linear infinite;
}

.spark-base-ring-teeth {
  width: 61%;
  aspect-ratio: 1;
  background:
    repeating-conic-gradient(from 5deg, rgba(87, 239, 255, 0.95) 0deg 3deg, rgba(223, 251, 255, 0.92) 3deg 5deg, transparent 5deg 9deg),
    radial-gradient(circle, rgba(87, 239, 255, 0.12) 0 56%, transparent 57%);

    radial-gradient(circle at 22% 50%, rgba(87, 239, 255, 0.24), transparent 26px);
  clip-path: polygon(0 18%, 12% 0, 76% 0, 100% 30%, 91% 100%, 12% 100%, 0 78%);
  cursor: pointer;
  outline: none;
  padding: 0;
  filter: drop-shadow(0 0 8px rgba(87, 239, 255, 0.22));

.spark-menu-button::before {
  content: "";
  position: absolute;
  left: 8px;
  top: 50%;
  width: 17px;
  height: 17px;
  border: 1px solid rgba(223, 251, 255, 0.6);
  border-radius: 50%;
  transform: translateY(-50%);
  background: rgba(223, 251, 255, 0.07);
  box-shadow: 0 0 9px rgba(87, 239, 255, 0.22);
}

.spark-menu-button::after {
  content: counter(style-option);
  position: absolute;
  left: -22px;
  top: 50%;
  transform: translateY(-56%);
  color: rgba(223, 251, 255, 0.88);
  font-size: 11px;
  line-height: 1;
  text-shadow: 0 0 6px rgba(87, 239, 255, 0.72);
}

.spark-menu-button span {

  left: 36px;
  right: 20px;
  top: 50%;
  height: 1px;
  transform: translateY(-50%);
  background: linear-gradient(90deg, rgba(87, 239, 255, 0.28), rgba(223, 251, 255, 0.04));
}

.spark-menu-button:hover,
.spark-menu-button:focus-visible,
.spark-menu-button.is-selected {
  border-color: rgba(185, 251, 255, 0.62);
  background:
    linear-gradient(110deg, rgba(12, 34, 42, 0.94), rgba(38, 128, 143, 0.42) 58%, rgba(7, 25, 32, 0.86)),

  box-shadow: 0 0 14px rgba(185, 251, 255, 0.56);

<script>
(() => {
  const cleanReloadMarker = () => {
    const url = new URL(window.location.href);
    if (!url.searchParams.has('meridian_reload')) return;
    url.searchParams.delete('meridian_reload');
    window.history.replaceState({}, document.title, `${url.pathname}${url.search}${url.hash}`);
  };
  cleanReloadMarker();
  const orb = document.querySelector('.date-orb');
  const month = document.querySelector('.date-orb-month');
  const day = document.querySelector('.date-orb-day');
  const hour = document.querySelector('.date-orb-hour');
  if (!orb || !month || !day || !hour) return;
  let lastHourKey = null;
  let hasRenderedDate = false;
  let burstTimer = null;
  const renderDate = () => {
    const now = new Date();
    month.textContent = now.toLocaleString(undefined, { month: 'short' }).toUpperCase();
    day.textContent = String(now.getDate()).padStart(2, '0');
    const hour12 = now.getHours() % 12 || 12;
    const elapsedSeconds = (now.getMinutes() * 60) + now.getSeconds();
    const hourProgress = elapsedSeconds / 3600 * 100;
    const hourGrowth = 1 + (Math.floor(now.getMinutes() / 10) * 0.1);
    const secondsToHour = 3600 - elapsedSeconds;
    const hourKey = `${now.getFullYear()}-${now.getMonth()}-${now.getDate()}-${now.getHours()}`;
    hour.textContent = String(hour12);
    orb.style.setProperty('--date-hour-progress', `${hourProgress.toFixed(2)} 100`);
    orb.style.setProperty('--date-hour-scale', hourGrowth.toFixed(2));
    if (secondsToHour > 0 && secondsToHour <= 30) {
      const urgency = (30 - secondsToHour) / 30;
      const pulseDuration = Math.round(1500 - (urgency * 1180));
      orb.style.setProperty('--date-pulse-duration', `${pulseDuration}ms`);
      orb.classList.add('is-countdown');
    } else {
      orb.classList.remove('is-countdown');
    }
    if (lastHourKey !== null && hourKey !== lastHourKey && hasRenderedDate) {
      orb.classList.remove('is-hour-burst');
      void orb.offsetWidth;
      orb.classList.add('is-hour-burst');
      window.clearTimeout(burstTimer);
      burstTimer = window.setTimeout(() => orb.classList.remove('is-hour-burst'), 1900);
    }
    lastHourKey = hourKey;
    hasRenderedDate = true;
    orb.classList.toggle('is-q1', hourProgress >= 25);
    orb.classList.toggle('is-q2', hourProgress >= 50);
    orb.classList.toggle('is-q3', hourProgress >= 75);
  };
  renderDate();
  window.setInterval(renderDate, 1000);
})();
(() => {
  const speechButton = document.querySelector('.speech-mode-button');
  if (speechButton) {
    speechButton.addEventListener('click', () => {
      const isOn = speechButton.getAttribute('aria-pressed') === 'true';
      speechButton.setAttribute('aria-pressed', isOn ? 'false' : 'true');
    });
  }
})();
(() => {
  const screen = document.querySelector('.harness-screen');
  const primeWindow = document.querySelector('.session-window-left');
  const userWindow = document.querySelector('.session-window-right');
  const sessionWindows = Array.from(document.querySelectorAll('.session-window'));
  if (!screen || !sessionWindows.length) return;
  if (primeWindow && !primeWindow.querySelector('.session-model-select')) {
    primeWindow.insertAdjacentHTML('afterbegin', `
      <select class="session-model-select" aria-label="Models">
        <option value="codex" selected>Codex</option>
        <option value="max">Max</option>
        <option value="auto" disabled>Auto</option>
      </select>
    `);
  }
  if (userWindow && !userWindow.querySelector('.session-target-select')) {
    userWindow.insertAdjacentHTML('afterbegin', `
      <select class="session-target-select" aria-label="User Sessions">
        <option value="">Sessions loading</option>
      </select>
    `);
  }
  sessionWindows.forEach((windowEl) => {
    const workspace = windowEl.querySelector('.session-workspace');
    if (!workspace || workspace.querySelector('.session-interface')) return;
    workspace.removeAttribute('aria-hidden');
    const isUser = windowEl.classList.contains('session-window-right');
    workspace.insertAdjacentHTML('afterbegin', `
      <div class="session-interface" aria-label="${isUser ? 'User' : 'Prime'} session interface">
        <textarea class="session-prompt-input" aria-label="${isUser ? 'User prompt input' : 'Prime prompt input'}" spellcheck="false"></textarea>
        <div class="session-response-output" aria-label="${isUser ? 'User response output' : 'Prime response output'}"></div>
        <div class="session-model-status" aria-live="polite"></div>
      </div>
    `);
  });

  document.querySelector('.session-window-right .session-text-slider')?.remove();
  const textSliders = Array.from(document.querySelectorAll('.session-text-slider input[type="range"]'));
  const textSizeKey = 'meridian.session.text-size';
  const readStoredTextSize = () => {
    try {
      return localStorage.getItem(textSizeKey);
    } catch {
      return null;
    }
  };
  const writeStoredTextSize = (value) => {
    try {
      localStorage.setItem(textSizeKey, String(value));
    } catch {
      // Text sizing still applies for the current page when storage is unavailable.
    }
  };
  const setTextSize = (value) => {
    const rawValue = Number(value);
    const sliderValue = Number.isFinite(rawValue) ? Math.min(100, Math.max(0, rawValue)) : 0;
    const fontSize = 10 + (sliderValue / 100) * 18;
    screen.style.setProperty('--session-text-size', `${fontSize.toFixed(1)}px`);
    textSliders.forEach((slider) => {
      slider.value = String(sliderValue);
    });
    writeStoredTextSize(sliderValue);
  };
  textSliders.forEach((slider) => {
    slider.removeAttribute('tabindex');
    slider.setAttribute('aria-label', 'Session text size');
    slider.addEventListener('input', () => setTextSize(slider.value));
    slider.addEventListener('change', () => setTextSize(slider.value));
  });
  setTextSize(readStoredTextSize() ?? textSliders[0]?.value ?? 0);

  const modelSelect = document.querySelector('.session-model-select');
  const projectSelect = document.querySelector('.session-project-select');
  const projectSelectKey = 'meridian.session.project';
  const projectOptions = ['Bifrost', 'Meridian', 'Spark'];
  const activeProjectContext = () => projectSelect?.value || 'Meridian';
  const updateProjectContextAuthority = () => {
    const project = activeProjectContext();
    window.meridianActiveProject = project;
    screen.dataset.projectContext = project;
    if (primeWindow) primeWindow.dataset.projectContext = project;
    if (projectSelect) {
      projectSelect.dataset.projectContext = project;
      projectSelect.title = `Compass project context: ${project}. User Session target is selected separately.`;
    }
  };
  if (projectSelect) {
    const storedProject = localStorage.getItem(projectSelectKey);
    projectSelect.replaceChildren();
    const placeholder = document.createElement('option');
    placeholder.value = '';
    placeholder.disabled = true;
    placeholder.textContent = 'Projects';
    projectSelect.append(placeholder);
    projectOptions.slice().sort((a, b) => a.localeCompare(b)).forEach((project) => {
      const option = document.createElement('option');
      option.value = project;
      option.textContent = project;
      projectSelect.append(option);
    });
    projectSelect.value = projectOptions.includes(storedProject) ? storedProject : 'Meridian';
    localStorage.setItem(projectSelectKey, projectSelect.value);
    updateProjectContextAuthority();
    projectSelect.addEventListener('change', () => {
      localStorage.setItem(projectSelectKey, projectSelect.value || 'Meridian');
      updateProjectContextAuthority();
      renderUserSessionSelect();
      updatePrimeProjectStatus();
    });
  } else {
    updateProjectContextAuthority();
  }
  if (modelSelect) {
    const storedModel = localStorage.getItem('meridian.session.model');
    modelSelect.value = storedModel === 'auto' ? 'codex' : (storedModel || modelSelect.value || 'codex');
    if (storedModel === 'auto') localStorage.setItem('meridian.session.model', 'codex');
    modelSelect.addEventListener('change', () => {
      localStorage.setItem('meridian.session.model', modelSelect.value || 'codex');
      updateModelReadiness();
    });
  }
  let modelReadiness = [];
  let bridgeCapabilities = {};
  let bridgeOnline = false;
  let userSessions = [];
  let userSessionsLoadFailed = false;
  const userSessionTargetKey = 'meridian.user-session.target.v1';
  const userSessionSelect = document.querySelector('.session-target-select');
  const localBridgeBase = 'http://127.0.0.1:8767/bridge';

    const recoveryPolicy = modelHarnessRecoveryPolicies[aspect] || [
      ['drift', 'model drift proof required'],
      ['retry', 'retry policy required before dispatch'],
      ['degrade', 'degraded route must be visible'],
      ['restore', 'restore proof required before continuation'],
    ];
    const observabilityPolicy = modelHarnessObservabilityPolicies[aspect] || [
      ['signal', 'model telemetry signal required'],
      ['snapshot', 'model snapshot proof required'],
      ['freshness', 'fresh signal required before acceptance'],
      ['missing', 'missing telemetry blocks acceptance'],
    ];
    const governancePolicy = modelHarnessGovernancePolicies[aspect] || [
      ['authority', 'governance authority required'],
      ['approval', 'approved model decision required'],
      ['audit', 'governance audit record required'],
      ['block', 'missing governance proof blocks execution'],
    ];
    const acceptancePolicy = modelHarnessAcceptancePolicies[aspect] || [
      ['criterion', 'acceptance criterion required'],
      ['proof', 'acceptance proof required'],
      ['reviewer', 'acceptance reviewer required'],
      ['stop', 'missing acceptance proof blocks use'],
    ];
    const compliancePolicy = modelHarnessCompliancePolicies[aspect] || [
      ['rule', 'compliance rule required'],
      ['evidence', 'compliance evidence required'],
      ['constraint', 'compliance constraint required'],
      ['block', 'missing compliance proof blocks use'],
    ];
    const evaluationPolicy = modelHarnessEvaluationPolicies[aspect] || [
      ['score', 'evaluation score required'],
      ['evidence', 'evaluation evidence required'],
      ['threshold', 'evaluation threshold required'],
      ['verdict', 'missing evaluation proof blocks use'],
    ];
    const proofTelemetry = [
      ['context', contextLogic],
      ['intent', intentLogic],
      ['gate', visibleGate],
      ['proof', proofLogic],
    ];
    return renderRightPanelSurface({
      title: `Model ${label} Harness`,
      status,
      surfaceClass: 'is-model-harness-surface',
      sections: [
        relaySection('Aspect logic', relayGrid([
          ['aspect', label],
          ['context logic', contextLogic],
          ['intent logic', intentLogic],
          ['proof logic', proofLogic],
        ]), true),
        relaySection('Proof telemetry', modelHarnessProofStrip(proofTelemetry), true),
        relaySection('Evidence route', modelHarnessEvidenceRoute(evidenceRoute), true),
        relaySection('Trust route', modelHarnessTrustRoute(trustRoute), true),
        relaySection('Capability envelope', modelHarnessCapabilityEnvelope(capabilityEnvelope), true),
        relaySection('Routing policy', modelHarnessRoutingPolicy(routingPolicy), true),
        relaySection('Handoff policy', modelHarnessHandoffPolicy(handoffPolicy), true),
        relaySection('Dispatch guard', modelHarnessDispatchGuard(dispatchGuard), true),
        relaySection('Recovery policy', modelHarnessRecoveryPolicy(recoveryPolicy), true),
        relaySection('Observability policy', modelHarnessObservabilityPolicy(observabilityPolicy), true),
        relaySection('Governance policy', modelHarnessGovernancePolicy(governancePolicy), true),
        relaySection('Acceptance policy', modelHarnessAcceptancePolicy(acceptancePolicy), true),
        relaySection('Compliance policy', modelHarnessCompliancePolicy(compliancePolicy), true),
        relaySection('Evaluation policy', modelHarnessEvaluationPolicy(evaluationPolicy), true),
        relaySection('Runtime signals', relayList(runtimeSignals), true),
        relaySection('Runtime contract', relayGrid([
          ['surface mode', 'Model Harness'],
          ['mutation policy', 'display-only until model harness backend is registered'],
          ['visible gate', visibleGate],
          ['drift guard', 'visible model state must match backend proof before writes are enabled'],
        ]), true),
        relaySection('Proof questions', relayList([
          'What context was visible before this model action?',
          'What intention was visible before execution?',
          'What proof shows the model action followed that logic?',
        ])),
      ],
    });
  };
  const renderSparkSurface = (label) => {
    return renderRightPanelSurface({
      title: `${label || 'Settings'} Surface`,
      status: 'planned',
      sections: [
        relaySection('Surface logic', relayGrid([
          ['mode', 'Settings/Spark'],
          ['selected surface', label || 'Settings'],
          ['prompt window', 'hidden in this mode'],
        ]), true),
        relaySection('Backend link', relayGrid([
          ['state', 'not wired yet'],
          ['mutation policy', 'blocked until an explicit settings backend exists'],
          ['drift guard', 'visible controls must match backend settings before writes are enabled'],
        ]), true),
      ],
    });
  };
  const renderHarnessSurface = (button) => {
    const harness = button?.dataset.harness || 'Harness';
    const title = button?.dataset.sessionTitle || harness;
    return renderRightPanelSurface({
      title,
      status: button?.dataset.status || 'planned',
      sections: [
        relaySection('Harness logic', relayGrid([
          ['harness', harness],
          ['surface mode', 'Harness'],
          ['prompt window', 'hidden in this mode'],
        ]), true),
        relaySection('Backend link', relayGrid([
          ['state', 'not wired for this harness yet'],
          ['visible proof', 'no backend logic snapshot is registered for this harness'],
          ['drift guard', 'no hidden backend mutation is available from this panel'],
        ]), true),
      ],
    });
  };
  const renderRelayModels = () => {
    if (!rightWindow || !rightWorkspace) return false;
    try {
      clearRightPanelSurface();
      rightWindow.classList.add('is-panel-surface');
      rightWindow.classList.add('is-relay-models');
      rightWorkspace.removeAttribute('aria-hidden');
      rightWorkspace.insertAdjacentHTML('beforeend', `
        <div class="relay-models-surface" role="region" aria-label="Relay models">
          <div class="relay-models-header">
            <div class="relay-models-title">Relay Runtime Logic</div>
            <div class="relay-models-status">Auto disabled</div>
          </div>
          <div class="relay-models-body">
            ${relaySection('Bridge route', '<div data-relay-bridge-status></div>', true)}
            <div data-relay-logic>${relaySection('Relay logic source', relayGrid([['status', 'loading backend snapshot']]))}</div>
          </div>
        </div>
      `);
      rightWorkspace.querySelector('.relay-models-surface')?.addEventListener('toggle', (event) => {
        const section = event.target;
        if (!(section instanceof HTMLDetailsElement) || !section.dataset.relaySection) return;
        const state = relaySectionState();
        state[section.dataset.relaySection] = section.open;
        localStorage.setItem(relaySectionStateKey, JSON.stringify(state));
      }, true);
      renderRelayBridgeStatus();
      loadRelayLogic();
      return true;
    } catch {
      restoreUserPanel({ warning: 'surface unavailable; User Session restored' });
      return false;
    }
  };
  const renderPrimeLogic = () => {
    if (!rightWindow || !rightWorkspace) return false;
    try {
      clearRightPanelSurface();
      rightWindow.classList.add('is-panel-surface');
      rightWorkspace.removeAttribute('aria-hidden');
      rightWorkspace.insertAdjacentHTML('beforeend', `
        <div class="relay-models-surface" role="region" aria-label="Prime runtime logic">
          <div class="relay-models-header">
            <div class="relay-models-title">Prime Runtime Logic</div>
            <div class="relay-models-status">Runtime logic</div>
          </div>
          <div class="relay-models-body">
            <div data-prime-logic>${relaySection('Prime logic source', relayGrid([['status', 'loading backend snapshot']]))}</div>
          </div>
        </div>
      `);
      rightWorkspace.querySelector('.relay-models-surface')?.addEventListener('toggle', (event) => {
        const section = event.target;
        if (!(section instanceof HTMLDetailsElement) || !section.dataset.relaySection) return;
        const state = relaySectionState();
        state[section.dataset.relaySection] = section.open;
        localStorage.setItem(relaySectionStateKey, JSON.stringify(state));
      }, true);
      loadPrimeLogic();
      return true;
    } catch {
      restoreUserPanel({ warning: 'surface unavailable; User Session restored' });
      return false;
    }
  };
  const renderCompassProjectLogic = () => {
    if (!rightWindow || !rightWorkspace) return false;
    try {
      clearRightPanelSurface();
      rightWindow.classList.add('is-panel-surface');
      rightWorkspace.removeAttribute('aria-hidden');
      rightWorkspace.insertAdjacentHTML('beforeend', `
        <div class="relay-models-surface" role="region" aria-label="Compass project logic">
          <div class="relay-models-header">
            <div class="relay-models-title">Compass Runtime Logic</div>
            <div class="relay-models-status">Project context</div>
          </div>
          <div class="relay-models-body">
            <div data-compass-logic>${relaySection('Compass logic source', relayGrid([['status', 'loading backend snapshot']]))}</div>
          </div>
        </div>
      `);
      rightWorkspace.querySelector('.relay-models-surface')?.addEventListener('toggle', (event) => {
        const section = event.target;
        if (!(section instanceof HTMLDetailsElement) || !section.dataset.relaySection) return;
        const state = relaySectionState();
        state[section.dataset.relaySection] = section.open;
        localStorage.setItem(relaySectionStateKey, JSON.stringify(state));
      }, true);
      loadCompassLogic();
      return true;
    } catch {
      restoreUserPanel({ warning: 'surface unavailable; User Session restored' });
      return false;
    }
  };
  const renderVulcanSessionLogic = () => {
    if (!rightWindow || !rightWorkspace) return false;
    try {
      clearRightPanelSurface();
      rightWindow.classList.add('is-panel-surface');
      rightWorkspace.removeAttribute('aria-hidden');
      rightWorkspace.insertAdjacentHTML('beforeend', `
        <div class="relay-models-surface" role="region" aria-label="Vulcan session lifecycle logic">
          <div class="relay-models-header">
            <div class="relay-models-title">Vulcan Runtime Logic</div>
            <div class="relay-models-status">Session lifecycle</div>
          </div>
          <div class="relay-models-body">
            <div data-vulcan-logic>${relaySection('Vulcan logic source', relayGrid([['status', 'loading backend snapshot']]))}</div>
          </div>
        </div>
      `);
      rightWorkspace.querySelector('.relay-models-surface')?.addEventListener('toggle', (event) => {
        const section = event.target;
        if (!(section instanceof HTMLDetailsElement) || !section.dataset.relaySection) return;
        const state = relaySectionState();
        state[section.dataset.relaySection] = section.open;
        localStorage.setItem(relaySectionStateKey, JSON.stringify(state));
      }, true);
      loadVulcanLogic();
      return true;
    } catch {
      restoreUserPanel({ warning: 'surface unavailable; User Session restored' });
      return false;
    }
  };
  const openSpark = () => {
    stage.classList.add('spark-menu-open');
    harnessDock.classList.remove('harness-dock-open');
  };
  const restoreUserPanel = ({ persist = true, warning = '' } = {}) => {
    screen.classList.add('session-theme-aqua');
    screen.classList.remove('session-theme-green');
    clearRightPanelSurface();
    setRightPanelAuthority('user', 'User', { persist, warning });
    window.meridianRefreshUserSessionTarget?.();
  };
  const refreshRelayPanel = () => {
    if (rightWorkspace?.querySelector('.relay-models-surface')) renderRelayBridgeStatus();
    if (rightWorkspace?.querySelector('[data-relay-logic]')) loadRelayLogic();
    if (rightWorkspace?.querySelector('[data-prime-logic]')) loadPrimeLogic();
    if (rightWorkspace?.querySelector('[data-compass-logic]')) loadCompassLogic();
    if (rightWorkspace?.querySelector('[data-vulcan-logic]')) loadVulcanLogic();
  };
  window.addEventListener('focus', refreshRelayPanel);
  document.addEventListener('visibilitychange', () => {
    if (!document.hidden) refreshRelayPanel();
  });
  const openHarness = () => {
    if (Date.now() < harnessDisabledUntil) return;
    harnessDock.classList.add('harness-dock-open');
    stage.classList.remove('spark-menu-open');
  };
  const closeBoth = () => {
    stage.classList.remove('spark-menu-open');
    harnessDock.classList.remove('harness-dock-open');
  };
  const distanceToRect = (event, rect) => {
    const cx = rect.left + rect.width / 2;
    const cy = rect.top + rect.height / 2;
    return Math.hypot(event.clientX - cx, event.clientY - cy);
  };
  const isInside = (event, rect, padX = 0, padY = 0) => (
    event.clientX >= rect.left - padX && event.clientX <= rect.right + padX &&
    event.clientY >= rect.top - padY && event.clientY <= rect.bottom + padY
  );
  const mergeRects = (rects) => {
    const usable = rects.filter((rect) => rect.width > 0 && rect.height > 0);
    if (!usable.length) return null;
    return usable.reduce((merged, rect) => ({
      left: Math.min(merged.left, rect.left),
      right: Math.max(merged.right, rect.right),
      top: Math.min(merged.top, rect.top),
      bottom: Math.max(merged.bottom, rect.bottom),
      width: Math.max(merged.right, rect.right) - Math.min(merged.left, rect.left),
      height: Math.max(merged.bottom, rect.bottom) - Math.min(merged.top, rect.top),
    }), usable[0]);
  };
  const harnessHoldRect = () => mergeRects(Array.from(harnessDock.querySelectorAll('.harness-dock-button, .harness-label, .harness-sub-label')).map((item) => item.getBoundingClientRect()));
  const chooseVisibleSystem = (event) => {
    if (Date.now() < harnessDisabledUntil) {
      harnessDock.classList.remove('harness-dock-open');
      return;
    }
    const sparkRect = spark.getBoundingClientRect();
    const menuRect = menu.getBoundingClientRect();
    const lineRect = harnessLine.getBoundingClientRect();
    const wasHarnessOpen = harnessDock.classList.contains('harness-dock-open');
    const sparkZone = {
      left: Math.min(sparkRect.left, menuRect.left),
      right: Math.max(sparkRect.right, menuRect.right),
      top: Math.min(sparkRect.top, menuRect.top),
      bottom: Math.max(sparkRect.bottom, menuRect.bottom),
      width: Math.max(sparkRect.right, menuRect.right) - Math.min(sparkRect.left, menuRect.left),
      height: Math.max(sparkRect.bottom, menuRect.bottom) - Math.min(sparkRect.top, menuRect.top),
    };
    const nearSpark = isInside(event, sparkZone, 42, 54);
    const lineHit = {
      left: lineRect.left,
      right: lineRect.right,
      top: lineRect.top + (lineRect.height / 2) - 1,
      bottom: lineRect.top + (lineRect.height / 2) + 15,
      width: lineRect.width,
      height: 16,
    };
    const lineTriggered = isInside(event, lineHit, 0, 0);
    const holdRect = wasHarnessOpen ? harnessHoldRect() : null;
    const holdingHarness = Boolean(wasHarnessOpen && holdRect && isInside(event, holdRect, 0, 0));
    const nearHarness = lineTriggered || holdingHarness;
    if (holdingHarness) {
      openHarness();
      return;
    }
    if (!nearSpark && !nearHarness) {
      closeBoth();
      return;
    }
    if (nearSpark && nearHarness) {
      const sparkDistance = distanceToRect(event, sparkRect);
      const harnessDistance = distanceToRect(event, lineRect);
      if (sparkDistance < harnessDistance) openSpark(); else openHarness();
      return;
    }
    if (nearSpark) openSpark(); else openHarness();
  };
  const clearSessionWindows = () => {
    try {
      [
        'meridian.session.transcript.prime',
        'meridian.session.prompt.prime',
        'meridian.session.rw.prompt',
        'meridian.session.rw.user-prompt',
      ].forEach((key) => localStorage.removeItem(key));
      Object.keys(localStorage)
        .filter((key) => key.startsWith('meridian.session.transcript.user.') || key.startsWith('meridian.session.prompt.user.'))
        .forEach((key) => localStorage.removeItem(key));
      return true;
    } catch {
      document.querySelectorAll('.session-prompt-input').forEach((input) => setStatus(input, 'reset storage error'));
      window.alert('Reset could not clear visible session state. The page was not reloaded.');
      return false;
    }
  };
  const clearModelStatusLabels = () => {
    document.querySelectorAll('.session-prompt-input').forEach((input) => setStatus(input, ''));
  };
  const hasResettableSessionState = () => {
    const hasPromptDraft = Array.from(document.querySelectorAll('.session-prompt-input'))
      .some((input) => input.value.trim().length > 0);
    if (hasPromptDraft) return true;
    return Object.keys(localStorage).some((key) => {
      if (!key.startsWith('meridian.session.transcript.') && !key.startsWith('meridian.session.prompt.')) return false;
      const value = localStorage.getItem(key);
      return typeof value === 'string' && value.trim().length > 2;
    });
  };
  let resetConfirmTimer = null;
  const resetButtonLabel = (button, label) => {
    if (!button) return;
    button.setAttribute('aria-label', label);
    const labelNode = button.querySelector('.spark-action-label');
    if (labelNode) labelNode.textContent = label;
  };
  const clearResetConfirmation = (button) => {
    window.clearTimeout(resetConfirmTimer);
    resetConfirmTimer = null;
    if (button) {
      button.dataset.resetConfirming = 'false';
      resetButtonLabel(button, 'Reset');
      button.removeAttribute('title');
    }
  };
  const confirmResetIfNeeded = (button) => {
    if (!hasResettableSessionState()) return true;
    if (button?.dataset.resetConfirming === 'true') {
      clearResetConfirmation(button);
      return true;
    }
    if (button) {
      button.dataset.resetConfirming = 'true';
      resetButtonLabel(button, 'Confirm Reset');
      button.title = 'Reset clears visible prompts and transcripts, then restarts the local Meridian bridge. Click again to confirm.';
      document.querySelectorAll('.session-prompt-input').forEach((input) => setStatus(input, 'confirm reset'));
      window.clearTimeout(resetConfirmTimer);
      resetConfirmTimer = window.setTimeout(() => clearResetConfirmation(button), 6000);
    }
    return false;
  };
  const hardReloadUi = ({ clearSessions = false } = {}) => {
    try {
      if (clearSessions && !clearSessionWindows()) return;
      const url = new URL(window.location.href);
      url.searchParams.set('meridian_reload', String(Date.now()));
      window.location.replace(url.toString());
    } catch {
      document.querySelectorAll('.session-prompt-input').forEach((input) => setStatus(input, 'reload error'));
      window.alert('Reload could not start. Check that Live Server is serving the Meridian root.');
    }
  };
  const waitForModelBridge = async () => {
    for (let attempt = 0; attempt < 24; attempt += 1) {
      try {
        const response = await fetch(bridgeUrl('models'), { cache: 'no-store' });
        const result = await response.json();
        if (result?.version === expectedBridgeVersion && result?.capabilities?.visibleTranscriptContext) return true;
      } catch {
        // Bridge may be between old and new process during reset.
      }
      await new Promise((resolve) => window.setTimeout(resolve, 250));
    }
    return false;
  };
  const restartModelBridge = async () => {
    try {
      await fetch(bridgeUrl('restart'), { method: 'POST', cache: 'no-store' });
      await waitForModelBridge();
    } catch {
      // Reset still reloads the UI; offline bridge status remains visible after reload.
    }
  };
  let resetInProgress = false;
  const resetUi = async (button) => {
    if (resetInProgress) return;
    if (!confirmResetIfNeeded(button)) return;
    resetInProgress = true;
    clearModelStatusLabels();
    if (!clearSessionWindows()) {
      resetInProgress = false;
      return;
    }
    await restartModelBridge();
    hardReloadUi();
  };
  let reloadInProgress = false;
  const reloadUi = () => {
    if (reloadInProgress) return;
    reloadInProgress = true;
    hardReloadUi();
  };
  const activateHarnessButton = (button, { persist = true } = {}) => {
    if (!button) return;
    const modelButton = isModelHarnessButton(button);
    screen.classList.remove('session-theme-aqua');
    screen.classList.remove('session-theme-green');
    if (userTitle) userTitle.textContent = button.dataset.sessionTitle || button.dataset.harness || 'User';
    clearRightPanelSurface();
    const rendered = button.dataset.harness === 'Prime'
      ? renderPrimeLogic()
      : button.dataset.harness === 'Relay'
      ? renderRelayModels()
      : (button.dataset.harness === 'Compass'
        ? renderCompassProjectLogic()
        : (button.dataset.harness === 'Session Lifecycle'
          ? renderVulcanSessionLogic()
          : (modelButton ? renderModelHarnessSurface(button) : renderHarnessSurface(button))));
    if (!rendered) return;
    if (modelButton) {
      setHarnessDockMode('model');
      setSelectedModelHarnessButton(button, { persist });
      screen.classList.add('session-theme-green');
    }
    screen.classList.add('sessions-visible');
    setRightPanelAuthority('harness', button.dataset.harness || 'Harness', { persist });
    harnessDisabledUntil = Date.now() + 2000;
    harnessDock.classList.remove('harness-dock-open');
  };
  const activateSparkButton = (button, { persist = true } = {}) => {
    if (!button) return;
    const actionLabel = button.getAttribute('aria-label') || '';
    buttons.forEach((item) => item.classList.remove('is-selected'));
    button.classList.add('is-selected');
    screen.classList.remove('session-theme-aqua');
    screen.classList.add('session-theme-green');
    if (userTitle) userTitle.textContent = actionLabel || 'Spark';
    const rendered = renderSparkSurface(actionLabel || 'Spark');
    if (!rendered) return;
    screen.classList.add('sessions-visible');
    setRightPanelAuthority('spark', actionLabel || 'Spark', { persist });
    openSpark();
  };
  buttons.forEach((button) => {
    button.addEventListener('click', async () => {
      const actionLabel = button.getAttribute('aria-label') || '';
      if (actionLabel === 'Reset' || actionLabel === 'Confirm Reset') {
        await resetUi(button);
        return;
      }
      if (actionLabel === 'Reload') {
        reloadUi();
        return;
      }
      if (actionLabel === 'Close') {
        buttons.forEach((item) => item.classList.remove('is-selected'));
        restoreUserPanel();
        openSpark();
        return;
      }
      activateSparkButton(button);
    });
  });
  mockupButtons.forEach((button, index) => {
    button.addEventListener('click', (event) => {
      event.preventDefault();
      event.stopPropagation();
      mockupButtons.forEach((item) => item.classList.remove('is-selected'));
      button.classList.add('is-selected');
      spark.classList.remove(
        'spark-design-1',
        'spark-design-2',
        'spark-design-3',
        'spark-design-4',
        'spark-design-5',
        'spark-design-6',
        'spark-design-7',
        'spark-design-8',
        'spark-design-9',
        'spark-design-10'
      );
      spark.classList.add(`spark-design-${index + 1}`);
    });
  });
  spark.addEventListener('pointerenter', openSpark);
  sparkToggle.addEventListener('pointerenter', openSpark);
  sparkToggle.addEventListener('click', () => {
    const panelsVisible = screen.classList.contains('sessions-visible');
    const harnessPanelActive = panelsVisible && !screen.classList.contains('session-theme-aqua');
    restoreUserPanel();
    if (!harnessPanelActive) screen.classList.toggle('sessions-visible');
    openSpark();
  });
  harnessDock.addEventListener('click', (event) => {
    if (event.target.closest?.('.harness-dock-button')) return;
    const hitButton = harnessButtons.find((button) => {
      const rect = button.getBoundingClientRect();
      return rect.width > 0 && rect.height > 0 && isInside(event, rect, 0, 0);
    });
    activateHarnessButton(hitButton);
  });
  harnessButtons.forEach((button) => {
    button.addEventListener('click', () => activateHarnessButton(button));
    button.addEventListener('keydown', (event) => {
      if (!isModelHarnessButton(button)) return;
      if (event.key === 'ArrowRight' || event.key === 'ArrowDown') {
        event.preventDefault();
        navigateModelHarnessAspect(button, 1);
      } else if (event.key === 'ArrowLeft' || event.key === 'ArrowUp') {
        event.preventDefault();
        navigateModelHarnessAspect(button, -1);
      } else if (event.key === 'Home') {
        event.preventDefault();
        activateModelHarnessAspectAt(0);
      } else if (event.key === 'End') {
        event.preventDefault();
        activateModelHarnessAspectAt(modelHarnessButtons().length - 1);
      }
    });
  });
  const restoreStoredRightPanel = () => {
    const stored = readStoredRightPanel();
    if (stored.mode === 'harness') {
      const button = harnessButtons.find((item) => item.dataset.harness === stored.selection);
      if (button) activateHarnessButton(button, { persist: false });
      else restoreUserPanel({ warning: 'surface unavailable; User Session restored' });
      return;
    }
    if (stored.mode === 'spark') {
      const button = buttons.find((item) => item.getAttribute('aria-label') === stored.selection);
      if (button && stored.selection !== 'Reset' && stored.selection !== 'Reload') activateSparkButton(button, { persist: false });
      else restoreUserPanel({ warning: 'surface unavailable; User Session restored' });
      return;
    }
    if (stored.warning) restoreUserPanel({ warning: stored.warning });
    else restoreUserPanel({ persist: false });
  };
  restoreStoredRightPanel();
  menu.addEventListener('pointerenter', openSpark);
  document.addEventListener('pointermove', chooseVisibleSystem);
})();
</script>
